name: Sync to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face CLI
        run: python -m pip install --upgrade "huggingface_hub[cli]"

      - name: Ensure Docker Space exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf repo create Grentjan35/SoulClash --type space --space-sdk docker --token "$HF_TOKEN" --exist-ok

      - name: Upload Space to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          import time
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          retries = 5

          for attempt in range(1, retries + 1):
              try:
                  api.upload_folder(
                      folder_path=".",
                      path_in_repo=".",
                      repo_id="Grentjan35/SoulClash",
                      repo_type="space",
                      ignore_patterns=[
                          ".git/*",
                          ".github/*",
                          "node_modules/*",
                          ".cache/huggingface/*",
                      ],
                  )
                  print("Upload completed.")
                  break
              except Exception as exc:
                  if attempt == retries:
                      raise
                  wait_seconds = min(2 ** attempt, 20)
                  print(f"Upload attempt {attempt} failed: {exc}")
                  print(f"Retrying in {wait_seconds} seconds...")
                  time.sleep(wait_seconds)
          PY
