        async function fetchWithRetry(url, options = {}, maxRetries = 3) {
            let lastError;
            for (let attempt = 0; attempt < maxRetries; attempt++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response;
                } catch (error) {
                    lastError = error;
                    if (attempt < maxRetries - 1) {
                        const delay = Math.pow(2, attempt) * 100; // 100ms, 200ms, 400ms
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }
            }
            throw lastError;
        }

        async function withConcurrencyLimit(fn) {
            return new Promise((resolve, reject) => {
                const run = async () => {
                    activeRequests++;
                    try {
                        const result = await fn();
                        activeRequests--;
                        processQueue();
                        resolve(result);
                    } catch (error) {
                        activeRequests--;
                        processQueue();
                        reject(error);
                    }
                };

                if (activeRequests < CONCURRENCY_LIMIT) {
                    run();
                } else {
                    requestQueue.push(run);
                }
            });
        }

        function processQueue() {
            while (requestQueue.length > 0 && activeRequests < CONCURRENCY_LIMIT) {
                const next = requestQueue.shift();
                next();
            }
        }

        async function fetchSecureAsset(assetPath) {
            // Check session cache first
            if (sessionAssetCache.has(assetPath)) {
                return sessionAssetCache.get(assetPath);
            }

            const response = await fetchWithAssetSession('/api/request_asset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: assetPath })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const { token, chunk_ids, total_size } = data;
            const assetSessionToken = await getAssetSessionToken();
            
            // Load chunks in parallel with concurrency limit
            const chunkPromises = chunk_ids.map(chunk_id => 
                withConcurrencyLimit(async () => {
                    const chunkRes = await fetchWithRetry(`/api/asset_chunk/${token}/${chunk_id}`, {
                        headers: {
                            'X-Asset-Session': assetSessionToken
                        }
                    });
                    const chunkData = await chunkRes.arrayBuffer();
                    return { chunk_id, data: chunkData };
                })
            );

            const chunks = await Promise.all(chunkPromises);
            
            // Combine chunks into single buffer
            const combinedBuffer = new Uint8Array(total_size);
            let offset = 0;
            for (const chunk of chunks) {
                combinedBuffer.set(new Uint8Array(chunk.data), offset);
                offset += chunk.data.byteLength;
            }

            // Create canvas from combined buffer
            const img = await createImageBitmap(new Blob([combinedBuffer]));
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = img.width;
            tempCanvas.height = img.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(img, 0, 0);

            // Cache the result
            sessionAssetCache.set(assetPath, tempCanvas);

            return tempCanvas;
        }

        async function loadCharacterAssets() {
            try {
                if (!assignedCharacter) {
                    console.error('No character assigned yet');
                    return;
                }
                
                loadingStage = 'Negotiating soul handshake...';
                updateLoadingScreen();

                const metaRes = await fetch(`/api/character_metadata/${assignedCharacter}`);
                characterMetadata = await metaRes.json();
                characterMetadataCache[assignedCharacter] = characterMetadata;
                
                loadingStage = 'Resolving runtime dependencies...';
                updateLoadingScreen();

                const assetNames = Object.keys(characterMetadata);
                
                // Get token for character asset access
                const characterToken = await getCharacterToken(assignedCharacter);
                
                // Load all assets in parallel using tokenized endpoint for security
                const loadPromises = assetNames.map(async (name, index) => {
                    const assetUrl = `/api/character_assets/${characterToken}/${assignedCharacter}/${name}`;
                    const blob = await fetchProtectedBlob(assetUrl, 'image/png');
                    const asset = await createImageBitmap(blob);
                    characterAssets[name] = asset;
                    
                    // Calculate progress based on both character assets and additional loading stages
                    const characterProgress = ((index + 1) / assetNames.length) * 70; // 70% for character assets
                    loadingProgress = characterProgress;
                    loadingStage = 'Streaming encrypted modules...';
                    updateLoadingScreen();
                    return asset;
                });
                
                await Promise.all(loadPromises);
                
                // Store assets in the multi-character cache
                playerCharacterAssets[assignedCharacter] = {...characterAssets};
                
                // Load map and other assets
                loadingStage = 'Synchronizing realm state...';
                loadingProgress = 80;
                updateLoadingScreen();
                
                await loadMap();
                syncCurrentMapToServer(true);
                
                loadingStage = 'Compiling client context...';
                loadingProgress = 95;
                updateLoadingScreen();
                
                loadingProgress = 100;
                loadingStage = 'Link established.';
                updateLoadingScreen();
                
                // Only add a small delay if loading was extremely fast (under 0.5s)
                // This prevents flickering on fast computers without forcing long waits
                const elapsed = Date.now() - loadingStartTime;
                if (elapsed < 500) {
                    await new Promise(resolve => setTimeout(resolve, 200)); // Just 200ms minimum, not 2 seconds
                }
                
                // Mark assets as ready - this will trigger checkIfCanStart()
                // The game will only start when the visual bar also reaches 100%
                markAssetsAsReady();
                
            } catch (error) {
                console.error('Error loading character assets:', error);
                loadingStage = 'Handshake interrupted';
                updateLoadingScreen();
            }
        }

        async function loadCharacterAssetsFor(characterName) {
            try {
                // Check if assets are already loaded for this character
                if (playerCharacterAssets[characterName]) {
                    return;
                }
                
                // Check if character is already being loaded
                if (loadingCharacters.has(characterName)) {
                    return;
                }
                
                // Check if character failed to load previously
                if (failedCharacters.has(characterName)) {
                    return;
                }
                
                // Mark character as loading
                loadingCharacters.add(characterName);
                console.log(`Loading assets for character: ${characterName}`);
                
                const metaRes = await fetch(`/api/character_metadata/${characterName}`);
                if (!metaRes.ok) {
                    throw new Error(`Failed to fetch metadata for ${characterName}: ${metaRes.status}`);
                }
                const metadata = await metaRes.json();
                characterMetadataCache[characterName] = metadata;

                const assetNames = Object.keys(metadata);
                const assets = {};
                
                // Get token for this character's assets
                const characterToken = await getCharacterToken(characterName);
                
                // Load all assets in parallel using tokenized endpoint
                const loadPromises = assetNames.map(async (name) => {
                    const assetUrl = `/api/character_assets/${characterToken}/${characterName}/${name}`;
                    const blob = await fetchProtectedBlob(assetUrl, 'image/png');
                    const asset = await createImageBitmap(blob);
                    assets[name] = asset;
                    return asset;
                });
                
                await Promise.all(loadPromises);
                
                // Store assets in the multi-character cache
                playerCharacterAssets[characterName] = assets;
                loadingCharacters.delete(characterName);
                console.log(`Assets loaded successfully for character: ${characterName}`);
            } catch (error) {
                console.error(`Error loading assets for character ${characterName}:`, error);
                loadingCharacters.delete(characterName);
                failedCharacters.add(characterName);
            }
        }

        function updateLoadingScreen() {
            updateLoadingBar(loadingProgress);
            renderLoadingText();
        }

        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.display = 'none';
            }
        }

        // Initialize loading screen
        updateLoadingScreen();
        
        let PLATFORMS = [];
        let currentMap = null;
        let tilesetImage = null;
        let backgroundImage = null;
        let backgroundImageCache = {};
        let missingBackgroundAssets = new Set();
        let backgroundCatalogPromise = null;
        let backgroundCompanionMap = {};
        let foregroundOverlayCache = new Map();
        let seamBridgeCache = new Map();
        let activeMapLoadPromise = null;
        let loadedMapName = null;
        let mapBounds = { minX: 0, maxX: 800, minY: 0, maxY: 600 };
        let spawnPoints = [];
        const BACKGROUND_PARALLAX_STRENGTH = 0.155;
        const BACKGROUND_PARALLAX_OVERSCAN = 1.26;
        const BACKGROUND_SEAM_BLEED = 72;
        const BACKGROUND_SEAM_BRIDGE_WIDTH = 220;

        function getForegroundAssetCandidates(backgroundAssetName) {
            if (typeof backgroundAssetName !== 'string') {
                return [];
            }

            const foregroundName = backgroundAssetName.replace(/^background_/i, 'foreground_');
            const fallbackForegroundName = backgroundAssetName.replace(/^background_/i, 'farground_');
            return [foregroundName, fallbackForegroundName]
                .filter((name, index, array) => name !== backgroundAssetName && array.indexOf(name) === index);
        }

        async function loadOptionalBackgroundBitmap(assetName) {
            if (typeof assetName !== 'string' || missingBackgroundAssets.has(assetName)) {
                return null;
            }

            if (backgroundImageCache[assetName]) {
                return backgroundImageCache[assetName];
            }

            try {
                return await loadBackgroundBitmap(assetName);
            } catch (error) {
                missingBackgroundAssets.add(assetName);
                console.warn(`Optional background asset "${assetName}" could not be loaded.`, error);
                return null;
            }
        }

        async function resolveForegroundBitmap(backgroundAssetName) {
            const catalogMappedAsset = backgroundCompanionMap[backgroundAssetName];
            if (catalogMappedAsset) {
                const bitmap = await loadOptionalBackgroundBitmap(catalogMappedAsset);
                if (bitmap) {
                    return { assetName: catalogMappedAsset, bitmap };
                }
            }

            const candidates = getForegroundAssetCandidates(backgroundAssetName);
            for (const candidate of candidates) {
                const bitmap = await loadOptionalBackgroundBitmap(candidate);
                if (bitmap) {
                    return { assetName: candidate, bitmap };
                }
            }

            return null;
        }

        function drawForegroundBackdrop(targetCtx, placement, bitmap, cameraOffsetX = 0, cameraOffsetY = 0) {
            if (!placement || !bitmap) {
                return;
            }

            const placementX = Number(placement.x) || 0;
            const placementY = Number(placement.y) || 0;
            const clipWidth = bitmap.width;
            const clipHeight = bitmap.height;
            const baseScreenX = placementX - cameraOffsetX;
            const baseScreenY = placementY - cameraOffsetY;

            const scaledWidth = clipWidth * BACKGROUND_PARALLAX_OVERSCAN;
            const scaledHeight = clipHeight * BACKGROUND_PARALLAX_OVERSCAN;
            const extraWidth = scaledWidth - clipWidth;
            const extraHeight = scaledHeight - clipHeight;
            const parallaxOffsetX = cameraOffsetX * BACKGROUND_PARALLAX_STRENGTH;
            const parallaxOffsetY = cameraOffsetY * BACKGROUND_PARALLAX_STRENGTH;
            const time = performance.now() * 0.001;
            const atmosphericDriftX = Math.sin(time * 0.27 + placementX * 0.002) * 7;
            const atmosphericDriftY = Math.cos(time * 0.19 + placementY * 0.002) * 5;

            const drawX = baseScreenX - extraWidth / 2 + parallaxOffsetX + atmosphericDriftX;
            const drawY = baseScreenY - extraHeight / 2 + parallaxOffsetY + atmosphericDriftY;

            targetCtx.save();
            targetCtx.beginPath();
            targetCtx.rect(
                baseScreenX - BACKGROUND_SEAM_BLEED,
                baseScreenY - BACKGROUND_SEAM_BLEED,
                clipWidth + BACKGROUND_SEAM_BLEED * 2,
                clipHeight + BACKGROUND_SEAM_BLEED * 2
            );
            targetCtx.clip();
            if ('filter' in targetCtx) {
                targetCtx.filter = 'blur(10px) brightness(0.48) saturate(0.72)';
            }
            targetCtx.globalAlpha = 0.22;
            targetCtx.drawImage(
                bitmap,
                drawX - BACKGROUND_SEAM_BLEED,
                drawY - BACKGROUND_SEAM_BLEED,
                scaledWidth + BACKGROUND_SEAM_BLEED * 2,
                scaledHeight + BACKGROUND_SEAM_BLEED * 2
            );
            if ('filter' in targetCtx) {
                targetCtx.filter = 'none';
            }
            targetCtx.globalAlpha = 1;
            targetCtx.restore();

            targetCtx.save();
            targetCtx.beginPath();
            targetCtx.rect(baseScreenX, baseScreenY, clipWidth, clipHeight);
            targetCtx.clip();

            if ('filter' in targetCtx) {
                targetCtx.filter = 'blur(1.8px) brightness(0.72) saturate(0.82) contrast(0.94)';
            }
            targetCtx.globalAlpha = 0.9;
            targetCtx.drawImage(bitmap, drawX, drawY, scaledWidth, scaledHeight);

            targetCtx.globalAlpha = 0.28;
            if ('filter' in targetCtx) {
                targetCtx.filter = 'blur(7px) brightness(0.56) saturate(0.7)';
            }
            targetCtx.drawImage(
                bitmap,
                drawX - clipWidth * 0.015,
                drawY - clipHeight * 0.01,
                scaledWidth * 1.015,
                scaledHeight * 1.015
            );

            if ('filter' in targetCtx) {
                targetCtx.filter = 'none';
            }
            targetCtx.globalAlpha = 1;

            const overlayCanvas = getForegroundOverlayCanvas(clipWidth, clipHeight);
            targetCtx.drawImage(overlayCanvas, baseScreenX, baseScreenY);
            targetCtx.restore();
        }

        function getForegroundOverlayCanvas(width, height) {
            const cacheKey = `${width}x${height}`;
            const cached = foregroundOverlayCache.get(cacheKey);
            if (cached) {
                return cached;
            }

            const overlayCanvas = document.createElement('canvas');
            overlayCanvas.width = width;
            overlayCanvas.height = height;
            const overlayCtx = overlayCanvas.getContext('2d');

            const fogGradient = overlayCtx.createLinearGradient(0, 0, 0, height);
            fogGradient.addColorStop(0, 'rgba(8, 12, 18, 0.08)');
            fogGradient.addColorStop(0.42, 'rgba(24, 30, 38, 0.14)');
            fogGradient.addColorStop(1, 'rgba(3, 4, 8, 0.34)');
            overlayCtx.fillStyle = fogGradient;
            overlayCtx.fillRect(0, 0, width, height);

            const beamGradient = overlayCtx.createLinearGradient(
                -width * 0.15,
                0,
                width * 1.05,
                height
            );
            beamGradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
            beamGradient.addColorStop(0.45, 'rgba(120, 150, 175, 0.025)');
            beamGradient.addColorStop(0.55, 'rgba(255, 255, 255, 0.06)');
            beamGradient.addColorStop(0.68, 'rgba(120, 150, 175, 0.02)');
            beamGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            overlayCtx.fillStyle = beamGradient;
            overlayCtx.fillRect(0, 0, width, height);

            const vignette = overlayCtx.createRadialGradient(
                width / 2,
                height / 2,
                Math.min(width, height) * 0.12,
                width / 2,
                height / 2,
                Math.max(width, height) * 0.84
            );
            vignette.addColorStop(0, 'rgba(0, 0, 0, 0.12)');
            vignette.addColorStop(0.45, 'rgba(0, 0, 0, 0.28)');
            vignette.addColorStop(0.72, 'rgba(0, 0, 0, 0.52)');
            vignette.addColorStop(1, 'rgba(0, 0, 0, 0.82)');
            overlayCtx.fillStyle = vignette;
            overlayCtx.fillRect(0, 0, width, height);

            foregroundOverlayCache.set(cacheKey, overlayCanvas);
            return overlayCanvas;
        }

        function drawLayerSeamBridges(targetCtx, placements, resolveBitmap, positionResolver = null) {
            if (!Array.isArray(placements) || placements.length < 2) {
                return;
            }

            const sortedPlacements = placements
                .filter((placement) => resolveBitmap(placement))
                .slice()
                .sort((a, b) => (Number(a.x) || 0) - (Number(b.x) || 0));

            for (let i = 0; i < sortedPlacements.length - 1; i++) {
                const leftPlacement = sortedPlacements[i];
                const rightPlacement = sortedPlacements[i + 1];
                const leftBitmap = resolveBitmap(leftPlacement);
                const rightBitmap = resolveBitmap(rightPlacement);
                if (!leftBitmap || !rightBitmap) {
                    continue;
                }

                const leftPosition = positionResolver
                    ? positionResolver(leftPlacement, leftBitmap)
                    : { x: Number(leftPlacement.x) || 0, y: Number(leftPlacement.y) || 0 };
                const rightPosition = positionResolver
                    ? positionResolver(rightPlacement, rightBitmap)
                    : { x: Number(rightPlacement.x) || 0, y: Number(rightPlacement.y) || 0 };

                const leftX = leftPosition.x;
                const leftY = leftPosition.y;
                const rightX = rightPosition.x;
                const rightY = rightPosition.y;
                const leftRight = leftX + leftBitmap.width;
                const seamCenterX = (leftRight + rightX) / 2;
                const seamTop = Math.min(leftY, rightY);
                const seamBottom = Math.max(leftY + leftBitmap.height, rightY + rightBitmap.height);
                const seamHeight = seamBottom - seamTop;

                if (seamHeight <= 0) {
                    continue;
                }

                const seamGap = Math.max(0, rightX - leftRight);
                const bridgeWidth = BACKGROUND_SEAM_BRIDGE_WIDTH + seamGap + BACKGROUND_SEAM_BLEED * 2;

                targetCtx.save();
                const bridgeCanvas = getForegroundSeamBridgeCanvas(
                    Math.ceil(bridgeWidth),
                    Math.ceil(seamHeight + BACKGROUND_SEAM_BLEED * 2)
                );
                targetCtx.drawImage(
                    bridgeCanvas,
                    seamCenterX - bridgeWidth / 2,
                    seamTop - BACKGROUND_SEAM_BLEED
                );
                targetCtx.restore();
            }
        }

        function drawForegroundSeamBridges(targetCtx, placements, cameraOffsetX, cameraOffsetY) {
            drawLayerSeamBridges(
                targetCtx,
                placements,
                (placement) => placement?.foregroundBitmap,
                (placement) => ({
                    x: (Number(placement.x) || 0) - cameraOffsetX,
                    y: (Number(placement.y) || 0) - cameraOffsetY
                })
            );
        }

        function drawBackgroundSeamBridges(targetCtx, placements, worldStartX, worldStartY, offsetX = 0, offsetY = 0, destOffsetX = 0, destOffsetY = 0) {
            drawLayerSeamBridges(
                targetCtx,
                placements,
                (placement) => backgroundImageCache[placement?.asset],
                (placement) => ({
                    x: destOffsetX + (Number(placement.x) || 0) - worldStartX + offsetX,
                    y: destOffsetY + (Number(placement.y) || 0) - worldStartY + offsetY
                })
            );
        }

        function getForegroundSeamBridgeCanvas(width, height) {
            const cacheKey = `${width}x${height}`;
            const cached = seamBridgeCache.get(cacheKey);
            if (cached) {
                return cached;
            }

            const bridgeCanvas = document.createElement('canvas');
            bridgeCanvas.width = Math.max(1, width);
            bridgeCanvas.height = Math.max(1, height);
            const bridgeCtx = bridgeCanvas.getContext('2d');

            bridgeCtx.filter = 'blur(14px)';

            const bridgeGradient = bridgeCtx.createLinearGradient(0, 0, bridgeCanvas.width, 0);
            bridgeGradient.addColorStop(0, 'rgba(20, 24, 30, 0)');
            bridgeGradient.addColorStop(0.16, 'rgba(24, 30, 38, 0.26)');
            bridgeGradient.addColorStop(0.5, 'rgba(30, 38, 48, 0.52)');
            bridgeGradient.addColorStop(0.84, 'rgba(24, 30, 38, 0.26)');
            bridgeGradient.addColorStop(1, 'rgba(20, 24, 30, 0)');
            bridgeCtx.fillStyle = bridgeGradient;
            bridgeCtx.fillRect(0, BACKGROUND_SEAM_BLEED, bridgeCanvas.width, Math.max(1, bridgeCanvas.height - BACKGROUND_SEAM_BLEED * 2));

            const mistGradient = bridgeCtx.createRadialGradient(
                bridgeCanvas.width / 2,
                bridgeCanvas.height * 0.55,
                bridgeCanvas.width * 0.06,
                bridgeCanvas.width / 2,
                bridgeCanvas.height * 0.55,
                bridgeCanvas.width * 0.52
            );
            mistGradient.addColorStop(0, 'rgba(118, 136, 156, 0.18)');
            mistGradient.addColorStop(0.4, 'rgba(64, 78, 94, 0.14)');
            mistGradient.addColorStop(1, 'rgba(10, 12, 18, 0)');
            bridgeCtx.fillStyle = mistGradient;
            bridgeCtx.fillRect(0, 0, bridgeCanvas.width, bridgeCanvas.height);
            bridgeCtx.filter = 'none';

            seamBridgeCache.set(cacheKey, bridgeCanvas);
            return bridgeCanvas;
        }

        function drawForegroundBackdrops(targetCtx, cameraOffsetX, cameraOffsetY) {
            if (!currentMap) {
                return;
            }

            const backgrounds = Array.isArray(currentMap.backgrounds) ? currentMap.backgrounds : [];
            backgrounds.forEach((placement) => {
                const foregroundBitmap = placement?.foregroundBitmap;
                if (!foregroundBitmap) {
                    return;
                }

                drawForegroundBackdrop(targetCtx, placement, foregroundBitmap, cameraOffsetX, cameraOffsetY);
            });

            drawForegroundSeamBridges(targetCtx, backgrounds, cameraOffsetX, cameraOffsetY);
        }

        async function loadBackgroundBitmap(assetName) {
            if (backgroundImageCache[assetName]) {
                return backgroundImageCache[assetName];
            }

            const environmentToken = await getEnvironmentToken();
            const backgroundBlob = await fetchProtectedBlob(`/api/background_asset/${environmentToken}/${encodeURIComponent(assetName)}`, 'image/png');
            const bitmap = await createImageBitmap(backgroundBlob);
            backgroundImageCache[assetName] = bitmap;
            return bitmap;
        }

        async function loadMapBackgrounds(mapData) {
            const placements = Array.isArray(mapData.backgrounds) ? mapData.backgrounds : [];
            if (placements.length === 0) {
                if (!backgroundImage) {
                    const environmentToken = await getEnvironmentToken();
                    const backgroundBlob = await fetchProtectedBlob(`/api/background/${environmentToken}`, 'image/png');
                    backgroundImage = await createImageBitmap(backgroundBlob);
                }
                mapData.backgrounds = [{ asset: 'background_1.png', x: 0, y: 0 }];
                backgroundImageCache['background_1.png'] = backgroundImage;
                return;
            }

            await loadBackgroundCatalog();

            await Promise.all(
                placements
                    .map((placement) => placement?.asset)
                    .filter((assetName, index, array) => typeof assetName === 'string' && array.indexOf(assetName) === index)
                    .map((assetName) => loadBackgroundBitmap(assetName))
            );

            await Promise.all(
                placements.map(async (placement) => {
                    if (!placement || typeof placement.asset !== 'string') {
                        return;
                    }

                    const foregroundResult = await resolveForegroundBitmap(placement.asset);
                    placement.foregroundAsset = foregroundResult?.assetName || null;
                    placement.foregroundBitmap = foregroundResult?.bitmap || null;
                })
            );
        }

        async function loadBackgroundCatalog() {
            if (backgroundCatalogPromise) {
                return backgroundCatalogPromise;
            }

            backgroundCatalogPromise = (async () => {
                try {
                    const environmentToken = await getEnvironmentToken();
                    const response = await fetchWithAssetSession(`/api/backgrounds/${environmentToken}`);

                    if (!response.ok) {
                        throw new Error(`Failed to load backgrounds: ${response.status}`);
                    }

                    const result = await response.json();
                    backgroundCompanionMap = result && typeof result.backgroundCompanions === 'object'
                        ? result.backgroundCompanions
                        : {};
                } catch (error) {
                    backgroundCatalogPromise = null;
                    console.warn('Unable to load background catalog.', error);
                    throw error;
                }
            })();

            return backgroundCatalogPromise;
        }
        
        // Load map from server
        async function loadMap(forceReload = false) {
            const urlParams = new URLSearchParams(window.location.search);
            const mapName = urlParams.get('map') || 'default';

            if (!forceReload && currentMap && loadedMapName === mapName) {
                return currentMap;
            }
            if (!forceReload && activeMapLoadPromise) {
                return activeMapLoadPromise;
            }

            activeMapLoadPromise = (async () => {
            try {
                console.log(`Loading map: ${mapName}`);
                
                const response = await fetch(`/api/current_map?map=${encodeURIComponent(mapName)}`);
                const mapData = await response.json();
                
                if (mapData.error) {
                    console.error('Map error:', mapData.error);
                    // Fallback to default platform
                    PLATFORMS = [{x: 0, y: 550, w: 800, h: 50}];
                    spawnPoints = [{x: 100, y: 500, id: 0}];
                    currentMap = null;
                    resetChunkedMapRenderer();
                    return;
                }
                
                currentMap = mapData;
                loadedMapName = mapName;
                console.log('Map data loaded:', mapData);

                // Load tileset image using tokenized endpoint for security
                if (!tilesetImage) {
                    const environmentToken = await getEnvironmentToken();
                    const tilesetBlob = await fetchProtectedBlob(`/api/tileset/${environmentToken}`, 'image/png');
                    tilesetImage = await createImageBitmap(tilesetBlob);
                }

                await loadMapBackgrounds(mapData);

                // Load spawn points from map
                spawnPoints = mapData.spawnPoints || [];
                console.log(`Loaded ${spawnPoints.length} spawn points:`, spawnPoints);
                
                // Convert tile map to platforms
                convertMapToPlatforms();
                
                console.log(`Map "${mapData.name}" loaded successfully with ${spawnPoints.length} spawn points`);
                return currentMap;
            } catch (error) {
                console.error('Error loading map:', error);
                // Fallback to default platform
                PLATFORMS = [{x: 0, y: 550, w: 800, h: 50}];
                spawnPoints = [{x: 100, y: 500, id: 0}];
                currentMap = null;
                loadedMapName = null;
                resetChunkedMapRenderer();
                return null;
            } finally {
                activeMapLoadPromise = null;
            }
            })();

            return activeMapLoadPromise;
        }
        
        let mapChunkBuildQueue = [];
        let mapChunkQueuedKeys = new Set();
        let mapChunkBuildFrameId = 0;
        let mapChunkGeneration = 0;

        function getMapChunkKey(chunkX, chunkY) {
            return `${chunkX},${chunkY}`;
        }

        function resetChunkedMapRenderer() {
            tileCache.clear();
            mapChunkBuildQueue = [];
            mapChunkQueuedKeys.clear();
            foregroundOverlayCache.clear();
            seamBridgeCache.clear();
            mapChunkGeneration += 1;
            if (mapChunkBuildFrameId) {
                cancelAnimationFrame(mapChunkBuildFrameId);
                mapChunkBuildFrameId = 0;
            }
        }

        function trimChunkCache() {
            if (tileCache.size <= MAX_CACHED_MAP_CHUNKS) {
                return;
            }

            const entries = Array.from(tileCache.entries())
                .sort((a, b) => (a[1].lastUsedAt || 0) - (b[1].lastUsedAt || 0));
            const overflow = tileCache.size - MAX_CACHED_MAP_CHUNKS;
            for (let i = 0; i < overflow; i++) {
                tileCache.delete(entries[i][0]);
            }
        }

        function drawMapRegion(targetCtx, worldStartX, worldStartY, regionWidth, regionHeight, destOffsetX = 0, destOffsetY = 0) {
            if (!currentMap || !tilesetImage || regionWidth <= 0 || regionHeight <= 0) {
                return;
            }

            const mapPixelWidth = currentMap.width * TILE_SIZE;
            const mapPixelHeight = currentMap.height * TILE_SIZE;
            const clampedStartX = Math.max(0, Math.min(worldStartX, mapPixelWidth));
            const clampedStartY = Math.max(0, Math.min(worldStartY, mapPixelHeight));
            const clampedEndX = Math.max(clampedStartX, Math.min(worldStartX + regionWidth, mapPixelWidth));
            const clampedEndY = Math.max(clampedStartY, Math.min(worldStartY + regionHeight, mapPixelHeight));

            if (clampedEndX <= clampedStartX || clampedEndY <= clampedStartY) {
                return;
            }

            const offsetX = clampedStartX - worldStartX;
            const offsetY = clampedStartY - worldStartY;
            const tiles = currentMap.tiles;
            const tilesetWidth = tilesetImage.width / 4;
            const tilesetHeight = tilesetImage.height / 3;

            const startTileX = Math.max(0, Math.floor(clampedStartX / TILE_SIZE));
            const endTileX = Math.min(currentMap.width, Math.ceil(clampedEndX / TILE_SIZE));
            const startTileY = Math.max(0, Math.floor(clampedStartY / TILE_SIZE));
            const endTileY = Math.min(currentMap.height, Math.ceil(clampedEndY / TILE_SIZE));

            for (let y = startTileY; y < endTileY; y++) {
                const row = tiles[y];
                for (let x = startTileX; x < endTileX; x++) {
                    const tileIndex = row[x];
                    if (tileIndex >= 0) {
                        const col = tileIndex % 4;
                        const tileRow = Math.floor(tileIndex / 4);
                        targetCtx.drawImage(
                            tilesetImage,
                            col * tilesetWidth, tileRow * tilesetHeight, tilesetWidth, tilesetHeight,
                            destOffsetX + x * TILE_SIZE - worldStartX + offsetX,
                            destOffsetY + y * TILE_SIZE - worldStartY + offsetY,
                            TILE_SIZE,
                            TILE_SIZE
                        );
                    }
                }
            }

            const backgrounds = Array.isArray(currentMap.backgrounds) ? currentMap.backgrounds : [];
            backgrounds.forEach((placement) => {
                const bitmap = backgroundImageCache[placement.asset];
                if (!bitmap) {
                    return;
                }

                const backgroundX = Number(placement.x) || 0;
                const backgroundY = Number(placement.y) || 0;
                const backgroundRight = backgroundX + bitmap.width;
                const backgroundBottom = backgroundY + bitmap.height;

                if (
                    backgroundRight <= clampedStartX ||
                    backgroundBottom <= clampedStartY ||
                    backgroundX >= clampedEndX ||
                    backgroundY >= clampedEndY
                ) {
                    return;
                }

                targetCtx.drawImage(
                    bitmap,
                    destOffsetX + backgroundX - worldStartX + offsetX,
                    destOffsetY + backgroundY - worldStartY + offsetY,
                    bitmap.width,
                    bitmap.height
                );
            });

            drawBackgroundSeamBridges(
                targetCtx,
                backgrounds,
                worldStartX,
                worldStartY,
                offsetX,
                offsetY,
                destOffsetX,
                destOffsetY
            );
        }

        function buildMapChunk(chunkX, chunkY) {
            if (!currentMap || !tilesetImage) {
                return null;
            }

            const worldX = chunkX * MAP_CHUNK_PIXEL_SIZE;
            const worldY = chunkY * MAP_CHUNK_PIXEL_SIZE;
            const mapPixelWidth = currentMap.width * TILE_SIZE;
            const mapPixelHeight = currentMap.height * TILE_SIZE;
            const chunkWidth = Math.min(MAP_CHUNK_PIXEL_SIZE, mapPixelWidth - worldX);
            const chunkHeight = Math.min(MAP_CHUNK_PIXEL_SIZE, mapPixelHeight - worldY);

            if (chunkWidth <= 0 || chunkHeight <= 0) {
                return null;
            }

            const chunkCanvas = document.createElement('canvas');
            chunkCanvas.width = chunkWidth;
            chunkCanvas.height = chunkHeight;
            const chunkCtx = chunkCanvas.getContext('2d');
            drawMapRegion(chunkCtx, worldX, worldY, chunkWidth, chunkHeight);
            return chunkCanvas;
        }

        function scheduleMapChunkBuild() {
            if (mapChunkBuildFrameId || mapChunkBuildQueue.length === 0) {
                return;
            }

            mapChunkBuildFrameId = requestAnimationFrame(() => {
                mapChunkBuildFrameId = 0;
                processMapChunkBuildQueue();
            });
        }

        function processMapChunkBuildQueue() {
            if (!currentMap || !tilesetImage) {
                mapChunkBuildQueue = [];
                mapChunkQueuedKeys.clear();
                return;
            }

            const startedAt = performance.now();
            while (mapChunkBuildQueue.length > 0 && performance.now() - startedAt < MAP_CHUNK_BUILD_BUDGET_MS) {
                const nextChunk = mapChunkBuildQueue.shift();
                mapChunkQueuedKeys.delete(nextChunk.key);

                if (nextChunk.generation !== mapChunkGeneration || tileCache.has(nextChunk.key)) {
                    continue;
                }

                const chunkCanvas = buildMapChunk(nextChunk.chunkX, nextChunk.chunkY);
                if (chunkCanvas) {
                    tileCache.set(nextChunk.key, {
                        canvas: chunkCanvas,
                        chunkX: nextChunk.chunkX,
                        chunkY: nextChunk.chunkY,
                        lastUsedAt: performance.now()
                    });
                }
            }

            trimChunkCache();
            if (mapChunkBuildQueue.length > 0) {
                scheduleMapChunkBuild();
            }
        }

        function queueMapChunk(chunkX, chunkY, priority = 0) {
            if (!currentMap) {
                return;
            }

            const maxChunkX = Math.ceil(currentMap.width / MAP_CHUNK_TILES) - 1;
            const maxChunkY = Math.ceil(currentMap.height / MAP_CHUNK_TILES) - 1;
            if (chunkX < 0 || chunkY < 0 || chunkX > maxChunkX || chunkY > maxChunkY) {
                return;
            }

            const key = getMapChunkKey(chunkX, chunkY);
            if (tileCache.has(key) || mapChunkQueuedKeys.has(key)) {
                return;
            }

            mapChunkQueuedKeys.add(key);
            mapChunkBuildQueue.push({
                key,
                chunkX,
                chunkY,
                priority,
                generation: mapChunkGeneration
            });
            mapChunkBuildQueue.sort((a, b) => a.priority - b.priority);
            scheduleMapChunkBuild();
        }

        function warmVisibleMapChunks(visibleWorldX, visibleWorldY, visibleWorldW, visibleWorldH) {
            if (!currentMap) {
                return;
            }

            const startChunkX = Math.max(0, Math.floor(visibleWorldX / MAP_CHUNK_PIXEL_SIZE) - MAP_CHUNK_PREFETCH_RADIUS);
            const endChunkX = Math.min(
                Math.ceil(currentMap.width / MAP_CHUNK_TILES) - 1,
                Math.floor((visibleWorldX + visibleWorldW - 1) / MAP_CHUNK_PIXEL_SIZE) + MAP_CHUNK_PREFETCH_RADIUS
            );
            const startChunkY = Math.max(0, Math.floor(visibleWorldY / MAP_CHUNK_PIXEL_SIZE) - MAP_CHUNK_PREFETCH_RADIUS);
            const endChunkY = Math.min(
                Math.ceil(currentMap.height / MAP_CHUNK_TILES) - 1,
                Math.floor((visibleWorldY + visibleWorldH - 1) / MAP_CHUNK_PIXEL_SIZE) + MAP_CHUNK_PREFETCH_RADIUS
            );

            const centerX = visibleWorldX + visibleWorldW / 2;
            const centerY = visibleWorldY + visibleWorldH / 2;

            for (let chunkY = startChunkY; chunkY <= endChunkY; chunkY++) {
                for (let chunkX = startChunkX; chunkX <= endChunkX; chunkX++) {
                    const chunkCenterX = chunkX * MAP_CHUNK_PIXEL_SIZE + MAP_CHUNK_PIXEL_SIZE / 2;
                    const chunkCenterY = chunkY * MAP_CHUNK_PIXEL_SIZE + MAP_CHUNK_PIXEL_SIZE / 2;
                    const dx = chunkCenterX - centerX;
                    const dy = chunkCenterY - centerY;
                    queueMapChunk(chunkX, chunkY, dx * dx + dy * dy);
                }
            }
        }

        function drawChunkedMap(targetCtx, visibleWorldX, visibleWorldY, visibleWorldW, visibleWorldH) {
            if (!currentMap || !tilesetImage) {
                return false;
            }

            warmVisibleMapChunks(visibleWorldX, visibleWorldY, visibleWorldW, visibleWorldH);

            const startChunkX = Math.max(0, Math.floor(visibleWorldX / MAP_CHUNK_PIXEL_SIZE));
            const endChunkX = Math.min(
                Math.ceil(currentMap.width / MAP_CHUNK_TILES) - 1,
                Math.floor((visibleWorldX + visibleWorldW - 1) / MAP_CHUNK_PIXEL_SIZE)
            );
            const startChunkY = Math.max(0, Math.floor(visibleWorldY / MAP_CHUNK_PIXEL_SIZE));
            const endChunkY = Math.min(
                Math.ceil(currentMap.height / MAP_CHUNK_TILES) - 1,
                Math.floor((visibleWorldY + visibleWorldH - 1) / MAP_CHUNK_PIXEL_SIZE)
            );

            for (let chunkY = startChunkY; chunkY <= endChunkY; chunkY++) {
                for (let chunkX = startChunkX; chunkX <= endChunkX; chunkX++) {
                    const key = getMapChunkKey(chunkX, chunkY);
                    const worldX = chunkX * MAP_CHUNK_PIXEL_SIZE;
                    const worldY = chunkY * MAP_CHUNK_PIXEL_SIZE;
                    const cachedChunk = tileCache.get(key);

                    if (cachedChunk?.canvas) {
                        cachedChunk.lastUsedAt = performance.now();
                        targetCtx.drawImage(
                            cachedChunk.canvas,
                            worldX - visibleWorldX,
                            worldY - visibleWorldY
                        );
                    } else {
                        drawMapRegion(
                            targetCtx,
                            worldX,
                            worldY,
                            Math.min(MAP_CHUNK_PIXEL_SIZE, currentMap.width * TILE_SIZE - worldX),
                            Math.min(MAP_CHUNK_PIXEL_SIZE, currentMap.height * TILE_SIZE - worldY),
                            worldX - visibleWorldX,
                            worldY - visibleWorldY
                        );
                    }
                }
            }

            return true;
        }

        // Convert tile map to platform rectangles using full tile boxes
        function convertMapToPlatforms() {
            PLATFORMS = [];
            
            if (!currentMap || !currentMap.tiles) {
                PLATFORMS = [{x: 0, y: 550, w: 800, h: 50}];
                return;
            }
            
            const tiles = currentMap.tiles;
            const mapWidth = currentMap.width;
            const mapHeight = currentMap.height;
            
            // Set map bounds
            mapBounds = {
                minX: 0,
                maxX: mapWidth * TILE_SIZE,
                minY: 0,
                maxY: mapHeight * TILE_SIZE
            };
            
            for (let y = 0; y < mapHeight; y++) {
                let runStartX = -1;
                let runTileType = -1;

                for (let x = 0; x <= mapWidth; x++) {
                    const tileType = x < mapWidth ? tiles[y][x] : -1;
                    const isSolid = tileType >= 0;

                    if (isSolid && runStartX === -1) {
                        runStartX = x;
                        runTileType = tileType;
                        continue;
                    }

                    const shouldFlushRun = runStartX !== -1 && (!isSolid || tileType !== runTileType);
                    if (shouldFlushRun) {
                        PLATFORMS.push({
                            x: runStartX * TILE_SIZE,
                            y: y * TILE_SIZE,
                            w: (x - runStartX) * TILE_SIZE,
                            h: TILE_SIZE,
                            tileType: runTileType
                        });
                        runStartX = isSolid ? x : -1;
                        runTileType = isSolid ? tileType : -1;
                    }
                }
            }

            resetChunkedMapRenderer();

        // Handle map loaded event from server

        // Handle initial dead bodies for new players
