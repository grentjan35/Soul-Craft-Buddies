        function lerp(start, end, t) {
            return start + (end - start) * t;
        }

        function cubicHermite(p0, m0, p1, m1, t) {
            const t2 = t * t;
            const t3 = t2 * t;
            return (
                (2 * t3 - 3 * t2 + 1) * p0 +
                (t3 - 2 * t2 + t) * m0 +
                (-2 * t3 + 3 * t2) * p1 +
                (t3 - t2) * m1
            );
        }

        function recordPacketReceiveTime(receivedAt) {
            packetReceiveTimes.push(receivedAt);
            if (packetReceiveTimes.length > PACKET_HISTORY_LIMIT) {
                packetReceiveTimes.shift();
            }
        }

        function updateServerClockOffset(serverTs) {
            if (typeof serverTs !== 'number') return;
            const measuredOffset = Date.now() - serverTs;
            if (serverClockOffsetMs === 0) {
                serverClockOffsetMs = measuredOffset;
                return;
            }

            serverClockOffsetMs = lerp(serverClockOffsetMs, measuredOffset, 0.15);
        }

        function updateAdaptiveInterpolationDelay() {
            if (packetReceiveTimes.length < 3) {
                renderDelayMs = MIN_INTERPOLATION_DELAY_MS;
                return;
            }

            const intervals = [];
            for (let i = 1; i < packetReceiveTimes.length; i++) {
                intervals.push(packetReceiveTimes[i] - packetReceiveTimes[i - 1]);
            }

            const meanInterval = intervals.reduce((sum, value) => sum + value, 0) / intervals.length;
            const variance =
                intervals.reduce((sum, value) => sum + Math.pow(value - meanInterval, 2), 0) / intervals.length;
            const jitterMs = Math.sqrt(variance);
            const targetDelay = Math.max(MIN_INTERPOLATION_DELAY_MS, meanInterval) + jitterMs * 2.5;

            renderDelayMs = Math.max(
                MIN_INTERPOLATION_DELAY_MS,
                Math.min(MAX_INTERPOLATION_DELAY_MS, lerp(renderDelayMs, targetDelay, 0.2))
            );
        }

        function appendSnapshot(store, id, snapshot) {
            if (!store[id]) {
                store[id] = [];
            }

            const snapshots = store[id];
            const lastSnapshot = snapshots[snapshots.length - 1];
            if (lastSnapshot && lastSnapshot.ts === snapshot.ts) {
                snapshots[snapshots.length - 1] = snapshot;
            } else {
                snapshots.push(snapshot);
            }

            const minTs = snapshot.ts - MAX_SNAPSHOT_AGE_MS;
            while (snapshots.length > 2 && snapshots[1].ts < minTs) {
                snapshots.shift();
            }
        }

        function sampleSnapshots(snapshots, renderTs, options = {}) {
            if (!snapshots || snapshots.length === 0) {
                return null;
            }

            if (snapshots.length === 1 || renderTs <= snapshots[0].ts) {
                return snapshots[0];
            }

            for (let i = 0; i < snapshots.length - 1; i++) {
                const from = snapshots[i];
                const to = snapshots[i + 1];
                if (renderTs <= to.ts) {
                    const span = Math.max(1, to.ts - from.ts);
                    const t = Math.max(0, Math.min(1, (renderTs - from.ts) / span));
                    const spanSeconds = span / 1000;
                    let x = lerp(from.x, to.x, t);
                    let y = lerp(from.y, to.y, t);

                    if (options.useBallisticPosition && typeof from.vx === 'number' && typeof to.vx === 'number') {
                        const dtSeconds = t * spanSeconds;
                        x = from.x + from.vx * dtSeconds;
                    } else if (options.useHermitePosition && typeof from.vx === 'number' && typeof to.vx === 'number') {
                        x = cubicHermite(from.x, from.vx * spanSeconds, to.x, to.vx * spanSeconds, t);
                    }

                    if (options.useBallisticPosition && typeof from.vy === 'number' && typeof to.vy === 'number') {
                        const acceleration = (to.vy - from.vy) / spanSeconds;
                        const dtSeconds = t * spanSeconds;
                        y = from.y + from.vy * dtSeconds + 0.5 * acceleration * dtSeconds * dtSeconds;
                    } else if (options.useHermitePosition && typeof from.vy === 'number' && typeof to.vy === 'number') {
                        y = cubicHermite(from.y, from.vy * spanSeconds, to.y, to.vy * spanSeconds, t);
                    }

                    return {
                        x,
                        y,
                        vy: typeof from.vy === 'number' && typeof to.vy === 'number' ? lerp(from.vy, to.vy, t) : to.vy,
                        vx: typeof from.vx === 'number' && typeof to.vx === 'number' ? lerp(from.vx, to.vx, t) : to.vx,
                        action: t < 0.5 ? from.action : to.action,
                        direction: t < 0.5 ? from.direction : to.direction,
                        on_ground: t < 0.5 ? from.on_ground : to.on_ground,
                        character: t < 0.5 ? from.character : to.character,
                        name: t < 0.5 ? from.name : to.name,
                        health: t < 0.5 ? from.health : to.health,
                        is_attacking: t < 0.5 ? from.is_attacking : to.is_attacking,
                        attack_start_time_ms: t < 0.5 ? from.attack_start_time_ms : to.attack_start_time_ms
                    };
                }
            }

            return snapshots[snapshots.length - 1];
        }

        function updateInterpolatedPlayerStates(renderNowTs) {
            const renderTs = renderNowTs - renderDelayMs;

            for (const sid in authoritativePlayerState) {
                const sampled = sampleSnapshots(playerSnapshots[sid], renderTs);
                if (!sampled) continue;

                playerState[sid] = {
                    ...authoritativePlayerState[sid],
                    x: sampled.x,
                    y: sampled.y,
                    vy: typeof sampled.vy === 'number' ? sampled.vy : authoritativePlayerState[sid].vy,
                    action: sampled.action ?? authoritativePlayerState[sid].action,
                    direction: sampled.direction ?? authoritativePlayerState[sid].direction,
                    on_ground: typeof sampled.on_ground === 'boolean' ? sampled.on_ground : authoritativePlayerState[sid].on_ground,
                    character: sampled.character ?? authoritativePlayerState[sid].character,
                    name: sampled.name ?? authoritativePlayerState[sid].name,
                    health: sampled.health ?? authoritativePlayerState[sid].health,
                    is_attacking: typeof sampled.is_attacking === 'boolean' ? sampled.is_attacking : authoritativePlayerState[sid].is_attacking,
                    attack_start_time_ms: typeof sampled.attack_start_time_ms === 'number' ? sampled.attack_start_time_ms : authoritativePlayerState[sid].attack_start_time_ms
                };
            }
        }

        function sampleFireballAtServerTime(fireball, renderServerTimeMs) {
            if (!fireball || typeof fireball.spawn_time_ms !== 'number') {
                return null;
            }

            const tickMs = 1000 / 60;
            const dtSeconds = 1 / 60;
            const gravityPerSecond = GRAVITY * 60;
            const elapsedMs = Math.max(0, renderServerTimeMs - fireball.spawn_time_ms);
            const stepFloat = elapsedMs / tickMs;
            const wholeSteps = Math.floor(stepFloat);
            const alpha = stepFloat - wholeSteps;

            const xAtStep = fireball.start_x + fireball.initial_vx * dtSeconds * wholeSteps;
            const yAtStep =
                fireball.start_y +
                wholeSteps * dtSeconds * fireball.initial_vy +
                gravityPerSecond * dtSeconds * dtSeconds * ((wholeSteps * (wholeSteps + 1)) / 2);
            const nextVy = fireball.initial_vy + gravityPerSecond * dtSeconds * (wholeSteps + 1);
            const nextX = xAtStep + fireball.initial_vx * dtSeconds;
            const nextY = yAtStep + nextVy * dtSeconds;
            const currentVy = fireball.initial_vy + gravityPerSecond * dtSeconds * wholeSteps;

            return {
                x: lerp(xAtStep, nextX, alpha),
                y: lerp(yAtStep, nextY, alpha),
                vx: fireball.initial_vx,
                vy: lerp(currentVy, nextVy, alpha)
            };
        }

        function updateInterpolatedFireballs(renderNowTs) {
            const renderServerTimeMs = Date.now() - renderDelayMs - serverClockOffsetMs;
            for (const id in authoritativeFireballs) {
                const fireballMeta = authoritativeFireballs[id];
                const cappedRenderTimeMs =
                    typeof fireballMeta.destroy_time_ms === 'number'
                        ? Math.min(renderServerTimeMs, fireballMeta.destroy_time_ms)
                        : renderServerTimeMs;
                const sampled = sampleFireballAtServerTime(fireballMeta, cappedRenderTimeMs);
                if (!sampled) continue;

                if (typeof fireballMeta.destroy_time_ms === 'number' && renderServerTimeMs > fireballMeta.destroy_time_ms) {
                    if (fireballAudio) {
                        fireballAudio.stopLoop(id);
                    }
                    delete fireballs[id];
                    delete authoritativeFireballs[id];
                    continue;
                }

                if (!fireballs[id]) {
                    fireballs[id] = {
                        id: id,
                        owner_sid: fireballMeta.owner_sid,
                        x: sampled.x,
                        y: sampled.y,
                        vx: sampled.vx ?? fireballMeta.vx,
                        vy: sampled.vy ?? fireballMeta.vy,
                        trail: [],
                        spawn_time_ms: fireballMeta.spawn_time_ms
                    };
                }

                fireballs[id].owner_sid = fireballMeta.owner_sid;
                fireballs[id].x = sampled.x;
                fireballs[id].y = sampled.y;
                fireballs[id].vx = sampled.vx ?? fireballMeta.vx;
                fireballs[id].vy = sampled.vy ?? fireballMeta.vy;
                fireballs[id].spawn_time_ms = fireballMeta.spawn_time_ms;
                const lastTrailPoint = fireballs[id].trail[fireballs[id].trail.length - 1];
                if (!lastTrailPoint || renderNowTs - lastTrailPoint.time >= FIREBALL_TRAIL_SAMPLE_INTERVAL_MS) {
                    fireballs[id].trail.push({ x: fireballs[id].x, y: fireballs[id].y, time: renderNowTs });
                }
                if (fireballs[id].trail.length > FIREBALL_TRAIL_MAX_POINTS) {
                    fireballs[id].trail.shift();
                }
            }

            for (const id in fireballs) {
                if (!authoritativeFireballs[id]) {
                    if (fireballAudio) {
                        fireballAudio.stopLoop(id);
                    }
                    delete fireballs[id];
                }
            }
        }

        function updateInterpolatedRenderState(renderNowTs) {
            updateInterpolatedPlayerStates(renderNowTs);
            updateInterpolatedFireballs(renderNowTs);
        }

        function updateSpatialFireballAudio() {
            if (!fireballAudio) {
                return;
            }

            const listenerState = getPlayerState(socket.id);
            if (!listenerState) {
                fireballAudio.stopAllLoops();
                return;
            }

            const audibleViewport = getAudibleViewport();
            for (const id in fireballs) {
                const fireball = fireballs[id];
                fireballAudio.startLoop(id, fireball.x, fireball.y, listenerState.x, listenerState.y, audibleViewport, 0.5);
                fireballAudio.updateLoop(id, fireball.x, fireball.y, listenerState.x, listenerState.y, audibleViewport);
            }
        }

        let lastSpatialAudioUpdateTime = 0;
        const SPATIAL_AUDIO_INTERVAL_MS = 33;

        function updateSpatialAudio(nowMs) {
            if (nowMs - lastSpatialAudioUpdateTime < SPATIAL_AUDIO_INTERVAL_MS) {
                return;
            }

            lastSpatialAudioUpdateTime = nowMs;
            updateSpatialFootstepAudio();
            updateSpatialFireballAudio();
        }

        function drawHealthBar(ctx, playerX, playerY, health, cameraX, cameraY) {
            if (health >= PLAYER_MAX_HEALTH) return;
            
            const barWidth = 50;
            const barHeight = 6;
            const barX = playerX - barWidth / 2;
            const barY = playerY - 70; // Moved up to be above the name
            
            // Background (red)
            ctx.fillStyle = "rgba(255, 0, 0, 0.7)";
            ctx.fillRect(barX - cameraX, barY - cameraY, barWidth, barHeight);
            
            // Health (green)
            const healthPercent = health / PLAYER_MAX_HEALTH;
            ctx.fillStyle = "rgba(0, 255, 0, 0.9)";
            ctx.fillRect(barX - cameraX, barY - cameraY, barWidth * healthPercent, barHeight);
            
            // Border
            ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
            ctx.lineWidth = 1;
            ctx.strokeRect(barX - cameraX, barY - cameraY, barWidth, barHeight);
        }

        function getPlayerState(playerId) {
            return playerState[playerId] || null;
        }
        
        function getPlayerPosition(playerId) {
            const state = playerState[playerId];
            return state ? { x: state.x, y: state.y } : null;
        }

        function getAudibleViewport() {
            return {
                x: cameraX,
                y: cameraY,
                width: canvas.width / cameraZoom,
                height: canvas.height / cameraZoom
            };
        }

        function updateSpatialFootstepAudio() {
            if (!footstepAudio) {
                return;
            }

            const listenerState = getPlayerState(socket.id);
            if (!listenerState) {
                for (const sid in previousFootstepPlayerStates) {
                    delete previousFootstepPlayerStates[sid];
                }
                for (const sid in footstepFrameCounters) {
                    delete footstepFrameCounters[sid];
                }
                return;
            }

            const audibleViewport = getAudibleViewport();

            for (const sid in playerState) {
                const currentState = playerState[sid];
                if (!currentState) {
                    continue;
                }

                const previousState = previousFootstepPlayerStates[sid];
                const movedHorizontally = previousState ? Math.abs(currentState.x - previousState.x) > 0.6 : false;
                const landedThisFrame = Boolean(previousState && !previousState.on_ground && currentState.on_ground);
                const isWalking = currentState.on_ground && (movedHorizontally || currentState.action === 'run');
                const isLocalPlayer = sid === socket.id;

                if (landedThisFrame) {
                    if (isLocalPlayer) {
                        footstepAudio.playLocal(0.6, -6.5, -2);
                    } else {
                        footstepAudio.playAt(
                            currentState.x,
                            currentState.y,
                            listenerState.x,
                            listenerState.y,
                            audibleViewport,
                            0.5,
                            -6.5,
                            -2
                        );
                    }
                    footstepFrameCounters[sid] = 0;
                } else if (isWalking) {
                    footstepFrameCounters[sid] = (footstepFrameCounters[sid] || 0) + 1;
                    if (footstepFrameCounters[sid] >= FOOTSTEP_FRAME_INTERVAL) {
                        if (isLocalPlayer) {
                            footstepAudio.playLocal(0.45, -6, -1);
                        } else {
                            footstepAudio.playAt(
                                currentState.x,
                                currentState.y,
                                listenerState.x,
                                listenerState.y,
                                audibleViewport,
                                0.35,
                                -6,
                                -1
                            );
                        }
                        footstepFrameCounters[sid] = 0;
                    }
                } else {
                    footstepFrameCounters[sid] = 0;
                }

                previousFootstepPlayerStates[sid] = {
                    x: currentState.x,
                    on_ground: currentState.on_ground
                };
            }

            for (const sid in previousFootstepPlayerStates) {
                if (!playerState[sid]) {
                    delete previousFootstepPlayerStates[sid];
                    delete footstepFrameCounters[sid];
                }
            }
        }

        function calculateRenderDimensions(frameW, frameH) {
            // Calculate scale to fit within PLAYER_MAX_SIZE while preserving aspect ratio
            const scaleX = PLAYER_MAX_SIZE / frameW;
            const scaleY = PLAYER_MAX_SIZE / frameH;
            const scale = Math.min(scaleX, scaleY);
            return {
                width: Math.round(frameW * scale),
                height: Math.round(frameH * scale)
            };
        }

        function getPlayerFrameRenderInfo(sid) {
            const state = playerState[sid];
            if (!state) return null;
            const action = state.action || 'idle';
            const direction = state.direction || 'right';
            const playerCharacter = state.character || 'spartan';
            const playerAssets = playerCharacterAssets[playerCharacter];
            const playerMetadata = characterMetadataCache[playerCharacter];
            if (!playerAssets || !playerAssets[action] || !playerMetadata || !playerMetadata[action]) {
                return null;
            }

            const meta = playerMetadata[action];
            const [cols, rows] = meta.grid.split('x').map(Number);
            const totalFrames = meta.frames;
            const frameState = playerAnimFrames[sid];
            const frameIdx = frameState ? Math.min(frameState.frame, totalFrames - 1) : 0;
            const frameW = playerAssets[action].width / cols;
            const frameH = playerAssets[action].height / rows;
            const renderDims = playerRenderDimensions[sid] || calculateRenderDimensions(frameW, frameH);

            return {
                state,
                direction,
                playerCharacter,
                action,
                image: playerAssets[action],
                frameIdx,
                frameX: (frameIdx % cols) * frameW,
                frameY: Math.floor(frameIdx / cols) * frameH,
                frameW,
                frameH,
                renderDims
            };
        }

        function getSpriteFrameAlpha(frameInfo) {
            const cacheKey = `${frameInfo.playerCharacter}|${frameInfo.action}|${frameInfo.frameIdx}`;
            const cached = spriteFrameAlphaCache.get(cacheKey);
            if (cached) return cached;

            const sampleCanvas = document.createElement('canvas');
            sampleCanvas.width = Math.max(1, Math.round(frameInfo.frameW));
            sampleCanvas.height = Math.max(1, Math.round(frameInfo.frameH));
            const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
            sampleCtx.drawImage(
                frameInfo.image,
                frameInfo.frameX,
                frameInfo.frameY,
                frameInfo.frameW,
                frameInfo.frameH,
                0,
                0,
                sampleCanvas.width,
                sampleCanvas.height
            );

            const imageData = sampleCtx.getImageData(0, 0, sampleCanvas.width, sampleCanvas.height);
            const result = { width: sampleCanvas.width, height: sampleCanvas.height, data: imageData.data };
            spriteFrameAlphaCache.set(cacheKey, result);
            return result;
        }

        function findNearestOpaquePixel(alphaFrame, x, y, maxRadius = 10) {
            const targetX = Math.max(0, Math.min(alphaFrame.width - 1, Math.round(x)));
            const targetY = Math.max(0, Math.min(alphaFrame.height - 1, Math.round(y)));

            for (let radius = 0; radius <= maxRadius; radius++) {
                const minX = Math.max(0, targetX - radius);
                const maxX = Math.min(alphaFrame.width - 1, targetX + radius);
                const minY = Math.max(0, targetY - radius);
                const maxY = Math.min(alphaFrame.height - 1, targetY + radius);
                for (let py = minY; py <= maxY; py++) {
                    for (let px = minX; px <= maxX; px++) {
                        const alphaIndex = (py * alphaFrame.width + px) * 4 + 3;
                        if (alphaFrame.data[alphaIndex] > 24) {
                            return { x: px, y: py };
                        }
                    }
                }
            }

            return null;
        }

        function createAttachedPlayerBurn(sid, impactX, impactY, sourceRadius = EXPLOSION_RADIUS) {
            const frameInfo = getPlayerFrameRenderInfo(sid);
            if (!frameInfo) return;

            const spriteLeft = frameInfo.state.x - frameInfo.renderDims.width / 2;
            const spriteTop = frameInfo.state.y - frameInfo.renderDims.height / 2;
            const localRenderX = frameInfo.direction === 'left'
                ? frameInfo.renderDims.width - (impactX - spriteLeft)
                : impactX - spriteLeft;
            const localRenderY = impactY - spriteTop;
            const sampleX = (localRenderX / Math.max(1, frameInfo.renderDims.width)) * frameInfo.frameW;
            const sampleY = (localRenderY / Math.max(1, frameInfo.renderDims.height)) * frameInfo.frameH;
            const alphaFrame = getSpriteFrameAlpha(frameInfo);
            const opaque = findNearestOpaquePixel(alphaFrame, sampleX, sampleY, 12);
            if (!opaque) return;

            const existing = attachedPlayerBurns.find((burn) => burn.sid === sid);
            if (existing) {
                existing.u = opaque.x / Math.max(1, frameInfo.frameW);
                existing.v = opaque.y / Math.max(1, frameInfo.frameH);
                existing.impactU = existing.u;
                existing.impactV = existing.v;
                existing.radius = Math.max(existing.radius, Math.max(18, sourceRadius * 0.62));
                existing.startTime = Date.now();
                existing.duration = Math.min(2600, existing.duration + 520);
                existing.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.28;
                return;
            }

            attachedPlayerBurns.push({
                id: `${sid}_${Date.now()}_${Math.random().toString(16).slice(2)}`,
                sid,
                u: opaque.x / Math.max(1, frameInfo.frameW),
                v: opaque.y / Math.max(1, frameInfo.frameH),
                impactU: opaque.x / Math.max(1, frameInfo.frameW),
                impactV: opaque.y / Math.max(1, frameInfo.frameH),
                radius: Math.max(18, sourceRadius * 0.62),
                startTime: Date.now(),
                duration: 2000,
                angle: -Math.PI / 2 + (Math.random() - 0.5) * 0.28
            });
        }

        function resolveAttachedBurnAnchor(frameInfo, burn) {
            const alphaFrame = getSpriteFrameAlpha(frameInfo);
            const desiredX = Math.max(0, Math.min(alphaFrame.width - 1, Math.round((burn.impactU ?? burn.u) * alphaFrame.width)));
            const desiredY = Math.max(0, Math.min(alphaFrame.height - 1, Math.round((burn.impactV ?? burn.v) * alphaFrame.height)));
            const currentX = Math.max(0, Math.min(alphaFrame.width - 1, Math.round(burn.u * alphaFrame.width)));
            const currentY = Math.max(0, Math.min(alphaFrame.height - 1, Math.round(burn.v * alphaFrame.height)));
            const currentAlphaIndex = (currentY * alphaFrame.width + currentX) * 4 + 3;
            let opaque = alphaFrame.data[currentAlphaIndex] > 24
                ? { x: currentX, y: currentY }
                : findNearestOpaquePixel(alphaFrame, desiredX, desiredY, 14) || findNearestOpaquePixel(alphaFrame, currentX, currentY, 18);

            if (!opaque) {
                return null;
            }

            burn.u = opaque.x / Math.max(1, alphaFrame.width);
            burn.v = opaque.y / Math.max(1, alphaFrame.height);

            const spriteLeft = frameInfo.state.x - frameInfo.renderDims.width / 2;
            const spriteTop = frameInfo.state.y - frameInfo.renderDims.height / 2;
            const localRenderX = frameInfo.direction === 'left'
                ? frameInfo.renderDims.width * (1 - burn.u)
                : frameInfo.renderDims.width * burn.u;
            const localRenderY = frameInfo.renderDims.height * burn.v;

            return {
                x: spriteLeft + localRenderX,
                y: spriteTop + localRenderY
            };
        }

        function drawAttachedPlayerBurnsForPlayer(sid, now) {
            attachedPlayerBurns = attachedPlayerBurns.filter((burn) => now - burn.startTime < burn.duration && playerState[burn.sid]);
            const burn = attachedPlayerBurns.find((entry) => entry.sid === sid);
            if (!burn) return;

            const frameInfo = getPlayerFrameRenderInfo(sid);
            if (!frameInfo) return;
            const anchor = resolveAttachedBurnAnchor(frameInfo, burn);
            if (!anchor) return;
            const progress = Math.max(0, Math.min(1, (now - burn.startTime) / burn.duration));
            const alpha = (1 - progress) * 0.9;
            const flameRadius = burn.radius * (0.82 + (1 - progress) * 0.18);
            const flickerTime = now * 0.0016 + stableStringNoise(burn.id) * 10;
            const sway = Math.sin(flickerTime * 1.6 + stableStringNoise(burn.sid) * 5) * 0.18;
            const flameAngle = (burn.angle ?? -Math.PI / 2) + sway;

            drawFireballGlow(anchor.x, anchor.y - flameRadius * 0.16, flameRadius * 1.55, 'rgba(255, 220, 130, __A__)', 'rgba(255, 92, 18, __A__)', alpha * 0.36);
            drawPixelFlameBody(
                anchor.x + Math.sin(flickerTime * 5.4) * 1.3,
                anchor.y - flameRadius * 0.24 - Math.abs(Math.cos(flickerTime * 4.1)) * 1.1,
                flameAngle + Math.sin(flickerTime) * 0.08,
                flameRadius * 0.56,
                alpha * 0.96,
                flickerTime,
                {
                    cellScale: 0.16,
                    tailLength: 0.72,
                    noseLength: 0.24,
                    width: 0.34,
                    alpha: 0.88,
                    emberChance: 0.08,
                    palette: ['#2d0b00', '#6f1b00', '#c44500', '#ff7d1f', '#ffc860', '#fff2c8']
                }
            );
        }

        // Dust particle system functions
        function createDustParticles(x, y, type) {
            // Remove old particles if we're at the limit
            while (window.dustParticles.length >= MAX_DUST_PARTICLES) {
                window.dustParticles.shift();
            }

            let particleCount, baseSize, lifetime, spread, color;
            
            switch(type) {
                case 'jump':
                    particleCount = 4;
                    baseSize = 2;
                    lifetime = 0.3;
                    spread = 15;
                    color = 'rgba(194, 178, 128, ';
                    break;
                case 'walk':
                    particleCount = 2;
                    baseSize = 1.5;
                    lifetime = 0.2;
                    spread = 8;
                    color = 'rgba(180, 160, 120, ';
                    break;
                case 'land':
                default:
                    particleCount = 8;
                    baseSize = 3;
                    lifetime = 0.5;
                    spread = 25;
                    color = 'rgba(160, 144, 104, ';
                    break;
            }

            for (let i = 0; i < particleCount; i++) {
                const angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.5;
                const velocity = spread * (0.5 + Math.random() * 0.5);
                
                let vx, vy;
                switch(type) {
                    case 'jump':
                        vx = Math.cos(angle) * velocity;
                        vy = Math.abs(Math.sin(angle)) * velocity * 0.5;
                        break;
                    case 'walk':
                        // Walking dust mostly spreads horizontally and slightly upward
                        vx = (Math.random() - 0.5) * spread;
                        vy = -Math.random() * spread * 0.3;
                        break;
                    case 'land':
                    default:
                        vx = Math.cos(angle) * velocity;
                        vy = -Math.abs(Math.sin(angle)) * velocity * 0.8;
                        break;
                }
                
                window.dustParticles.push({
                    x: x + (Math.random() - 0.5) * 5, // Slight horizontal randomness
                    y: y,
                    vx: vx,
                    vy: vy,
                    size: baseSize + Math.random() * 2,
                    alpha: 0.7,
                    lifetime: lifetime,
                    age: 0,
                    color: color
                });
            }
        }

        function updateDustParticles(dt) {
            for (let i = window.dustParticles.length - 1; i >= 0; i--) {
                const particle = window.dustParticles[i];
                
                // Update particle physics
                particle.x += particle.vx * dt;
                particle.y += particle.vy * dt;
                particle.vy += 50 * dt; // Light gravity
                particle.age += dt;
                
                // Fade out
                particle.alpha = Math.max(0, 0.7 * (1 - particle.age / particle.lifetime));
                
                // Remove dead particles
                if (particle.age >= particle.lifetime) {
                    window.dustParticles.splice(i, 1);
                }
            }
        }

        function drawDustParticles() {
            ctx.save();
            for (const particle of window.dustParticles) {
                ctx.fillStyle = particle.color + particle.alpha + ')';
                // Replaced ctx.arc with ctx.fillRect. 
                // Rectangles render 10x faster on CPU canvas than path circles.
                ctx.fillRect(
                    particle.x - cameraX - particle.size/2, 
                    particle.y - cameraY - particle.size/2, 
                    particle.size, 
                    particle.size
                );
            }
            ctx.restore();
        }


        function addScreenShake(amount) {
            screenShakeTrauma = Math.min(1, screenShakeTrauma + amount);
        }

        function getShakeListenerPosition() {
            const localState = getPlayerState(socket.id) || authoritativePlayerState[socket.id];
            if (localState && Number.isFinite(localState.x) && Number.isFinite(localState.y)) {
                return { x: localState.x, y: localState.y };
            }

            const visibleWidth = canvas.width / Math.max(cameraZoom, 0.001);
            const visibleHeight = canvas.height / Math.max(cameraZoom, 0.001);
            return {
                x: cameraX + visibleWidth / 2,
                y: cameraY + visibleHeight / 2
            };
        }

        function getDistanceBasedShake(distance, nearDistance, farDistance, maxShake) {
            if (!Number.isFinite(distance) || distance >= farDistance) {
                return 0;
            }

            if (distance <= nearDistance) {
                return maxShake;
            }

            const t = (distance - nearDistance) / Math.max(1, farDistance - nearDistance);
            const eased = 1 - t;
            return maxShake * eased * eased;
        }

        function addDistanceShake(worldX, worldY, nearDistance, farDistance, maxShake) {
            if (!Number.isFinite(worldX) || !Number.isFinite(worldY)) {
                return;
            }

            const listener = getShakeListenerPosition();
            const distance = Math.hypot(listener.x - worldX, listener.y - worldY);
            const shakeStrength = getDistanceBasedShake(distance, nearDistance, farDistance, maxShake);
            if (shakeStrength > 0) {
                addScreenShake(shakeStrength);
            }
        }

        function updateScreenShake(dt) {
            screenShakeTrauma = Math.max(0, screenShakeTrauma - dt * 1.8);
            const shakePower = screenShakeTrauma * screenShakeTrauma;
            const time = performance.now() * 0.05;
            screenShakeOffsetX = (Math.sin(time * 1.7) + Math.cos(time * 2.3)) * 18 * shakePower;
            screenShakeOffsetY = (Math.cos(time * 1.4) + Math.sin(time * 2.9)) * 14 * shakePower;
        }

        function getRadialSpriteCanvas(type) {
            const cached = radialSpriteCache.get(type);
            if (cached) {
                return cached;
            }

            const spriteCanvas = document.createElement('canvas');
            spriteCanvas.width = 128;
            spriteCanvas.height = 128;
            const spriteCtx = spriteCanvas.getContext('2d');
            const center = spriteCanvas.width / 2;
            const gradient = spriteCtx.createRadialGradient(center, center, center * 0.1, center, center, center);

            if (type === 'smoke') {
                gradient.addColorStop(0, 'rgba(108, 96, 90, 0.42)');
                gradient.addColorStop(0.38, 'rgba(66, 58, 54, 0.3)');
                gradient.addColorStop(0.72, 'rgba(38, 33, 30, 0.18)');
                gradient.addColorStop(1, 'rgba(20, 16, 14, 0)');
            } else if (type === 'flash') {
                gradient.addColorStop(0, 'rgba(255, 255, 245, 1)');
                gradient.addColorStop(0.18, 'rgba(255, 239, 168, 0.95)');
                gradient.addColorStop(0.46, 'rgba(255, 155, 52, 0.62)');
                gradient.addColorStop(0.72, 'rgba(255, 88, 22, 0.22)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            }

            spriteCtx.fillStyle = gradient;
            spriteCtx.fillRect(0, 0, spriteCanvas.width, spriteCanvas.height);
            radialSpriteCache.set(type, spriteCanvas);
            return spriteCanvas;
        }

        function getGlowSpriteCanvas(innerColor, outerColor, alpha) {
            const cacheKey = `${innerColor}|${outerColor}|${alpha.toFixed(3)}`;
            const cached = radialSpriteCache.get(cacheKey);
            if (cached) {
                return cached;
            }

            const spriteCanvas = document.createElement('canvas');
            spriteCanvas.width = 128;
            spriteCanvas.height = 128;
            const spriteCtx = spriteCanvas.getContext('2d');
            const center = spriteCanvas.width / 2;
            const gradient = spriteCtx.createRadialGradient(center, center, center * 0.15, center, center, center);
            gradient.addColorStop(0, innerColor.replace('__A__', String(alpha)));
            gradient.addColorStop(0.45, outerColor.replace('__A__', String(alpha * 0.65)));
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            spriteCtx.fillStyle = gradient;
            spriteCtx.fillRect(0, 0, spriteCanvas.width, spriteCanvas.height);
            radialSpriteCache.set(cacheKey, spriteCanvas);
            return spriteCanvas;
        }

        function drawRadialSpriteAt(worldX, worldY, radius, spriteCanvas, alpha = 1, driftX = 0, driftY = 0) {
            const drawSize = radius * 2;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.drawImage(
                spriteCanvas,
                worldX - cameraX + driftX - radius,
                worldY - cameraY + driftY - radius,
                drawSize,
                drawSize
            );
            ctx.restore();
        }

        function drawFireballGlow(x, y, radius, innerColor, outerColor, alpha = 1) {
            const spriteCanvas = getGlowSpriteCanvas(innerColor, outerColor, alpha);
            drawRadialSpriteAt(x, y, radius, spriteCanvas);
        }

        function flameNoise(seedA, seedB) {
            return Math.sin(seedA * 12.9898 + seedB * 78.233) * 0.5 + Math.cos(seedA * 7.13 - seedB * 21.77) * 0.5;
        }

        function stableStringNoise(value) {
            const text = String(value ?? '');
            let hash = 2166136261;
            for (let i = 0; i < text.length; i++) {
                hash ^= text.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
            }
            return Math.abs(hash % 100000) / 100000;
        }

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));
        }

        function drawPixelFlameBody(centerX, centerY, angle, scale, intensity, timeSeed, options = {}) {
            if (!Number.isFinite(centerX) || !Number.isFinite(centerY) || !Number.isFinite(scale) || scale <= 0 || intensity <= 0) {
                return;
            }

            const cellSize = Math.max(2, Math.round(scale * (options.cellScale ?? 0.15)));
            const palette = options.palette ?? ['#2f0b00', '#792000', '#c94700', '#ff7a1f', '#ffc55a', '#fff3c4'];
            const tailLength = scale * (options.tailLength ?? 1.28);
            const noseLength = scale * (options.noseLength ?? 0.46);
            const halfWidth = scale * (options.width ?? 0.56);
            const rows = Math.max(5, Math.ceil((halfWidth * 2) / cellSize));
            const cols = Math.max(7, Math.ceil((tailLength + noseLength) / cellSize));
            const jitter = scale * 0.06;
            const pixelAlpha = clamp01(intensity * (options.alpha ?? 0.9));
            const emberChance = options.emberChance ?? 0.18;
            const floorCols = Math.max(1, cols - 1);
            const floorRows = Math.max(1, rows - 1);

            ctx.save();
            ctx.translate(Math.round(centerX - cameraX), Math.round(centerY - cameraY));
            ctx.rotate(angle);

            for (let col = 0; col < cols; col++) {
                const colT = col / floorCols;
                const x = -tailLength + colT * (tailLength + noseLength);
                const profile = Math.sin(clamp01(colT) * Math.PI);
                const taper = 1 - Math.pow(Math.abs(colT - 0.72) / 0.72, 2);
                const widthAtCol = Math.max(cellSize * 0.7, halfWidth * (0.2 + Math.max(profile, 0) * 0.55 + Math.max(taper, 0) * 0.2));
                const tailBias = Math.pow(1 - colT, 1.3);
                const flameLift = Math.sin(timeSeed * 10 + col * 0.9) * jitter;
                const heatBase = clamp01(0.18 + colT * 1.1);
                const coreBias = clamp01((colT - 0.48) * 1.9);

                for (let row = 0; row < rows; row++) {
                    const rowT = row / floorRows;
                    const lateral = (rowT - 0.5) * 2;
                    const distance = Math.abs(lateral);
                    const shapeLimit = widthAtCol * (0.92 - distance * 0.75);
                    if (shapeLimit <= 0) {
                        continue;
                    }

                    const wave = flameNoise(colT * 4.8 + timeSeed * 0.9, rowT * 5.6 + timeSeed * 0.5);
                    const turbulence = wave * cellSize * (0.7 + tailBias * 0.9);
                    const y = lateral * widthAtCol + turbulence * 0.35 + flameLift * (1 - distance * 0.4);
                    const density = heatBase - distance * (0.5 + tailBias * 0.22) + wave * 0.16;
                    if (density <= 0.06) {
                        continue;
                    }

                    const paletteT = clamp01(coreBias * 0.85 + density * 0.7 + (1 - distance) * 0.12);
                    const colorIndex = Math.min(palette.length - 1, Math.max(0, Math.floor(paletteT * palette.length)));
                    const sizeJitter = 1 + Math.round(clamp01(wave * 0.5 + 0.5) * (options.extraCellSize ?? 1));
                    const drawSize = cellSize * sizeJitter;
                    const drawX = Math.round(x + wave * jitter - drawSize * 0.5);
                    const drawY = Math.round(y - drawSize * 0.5);

                    ctx.globalAlpha = pixelAlpha * clamp01(0.42 + density * 0.92);
                    ctx.fillStyle = palette[colorIndex];
                    ctx.fillRect(drawX, drawY, drawSize, drawSize);

                    if (
                        colorIndex >= palette.length - 2 &&
                        distance < 0.42 &&
                        Math.sin(timeSeed * 16 + col * 1.7 + row * 2.1) > 0.58
                    ) {
                        ctx.globalAlpha = pixelAlpha * 0.4;
                        ctx.fillStyle = '#fff9d8';
                        ctx.fillRect(drawX, drawY, Math.max(2, drawSize - 1), Math.max(2, drawSize - 1));
                    }

                    const emberSignal = Math.sin(timeSeed * 14 + col * 2.3 + row * 3.1);
                    if (emberSignal > 1 - emberChance * clamp01(tailBias + 0.12) * 2 && colorIndex >= 2 && distance > 0.2) {
                        ctx.globalAlpha = pixelAlpha * 0.25;
                        ctx.fillStyle = colorIndex >= palette.length - 2 ? '#ffd77d' : '#ff9a33';
                        ctx.fillRect(drawX - cellSize, drawY, cellSize, cellSize);
                    }
                }
            }

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawOrganicFlameBody(centerX, centerY, angle, scale, intensity, timeSeed) {
            drawPixelFlameBody(centerX, centerY, angle, scale, intensity, timeSeed);
        }

        function drawSmokePuff(worldX, worldY, radius, alpha, driftX = 0, driftY = 0) {
            if (
                !Number.isFinite(worldX) ||
                !Number.isFinite(worldY) ||
                !Number.isFinite(radius) ||
                !Number.isFinite(alpha) ||
                radius <= 0 ||
                alpha <= 0
            ) {
                return;
            }

            drawRadialSpriteAt(worldX, worldY, radius, getRadialSpriteCanvas('smoke'), alpha, driftX, driftY);
        }

        function drawExplosionLobe(centerX, centerY, radius, alpha, seed) {
            if (!Number.isFinite(centerX) || !Number.isFinite(centerY) || !Number.isFinite(radius) || radius <= 0 || alpha <= 0) {
                return;
            }

            const burstCount = 5;
            for (let i = 0; i < burstCount; i++) {
                const burstAngle = seed * 0.7 + i * ((Math.PI * 2) / burstCount) + Math.sin(seed + i) * 0.25;
                const burstDistance = radius * (0.14 + i * 0.08);
                const burstScale = radius * (0.46 - i * 0.05);
                drawPixelFlameBody(
                    centerX + Math.cos(burstAngle) * burstDistance,
                    centerY + Math.sin(burstAngle) * burstDistance,
                    burstAngle,
                    burstScale,
                    alpha * (1 - i * 0.08),
                    seed * 0.9 + i * 0.8,
                    {
                        cellScale: 0.16,
                        tailLength: 0.9,
                        noseLength: 0.62,
                        width: 0.6,
                        alpha: 0.88,
                        emberChance: 0.12,
                        extraCellSize: i === 0 ? 1 : 0,
                        palette: ['#3a0d00', '#7a1d00', '#cf4200', '#ff7e20', '#ffca62', '#fff4cf']
                    }
                );
            }

            drawPixelFlameBody(centerX, centerY, seed * 0.35, radius * 0.9, alpha * 1.15, seed * 0.7, {
                cellScale: 0.15,
                tailLength: 0.84,
                noseLength: 0.84,
                width: 0.78,
                alpha: 0.82,
                emberChance: 0.14,
                extraCellSize: 1,
                palette: ['#451100', '#922700', '#de4d08', '#ff9a2e', '#ffd36d', '#fff1bf']
            });
        }

        function findNearestSurfaceAnchor(x, y, searchDistance = 96) {
            let bestAnchor = null;
            let bestDistance = Infinity;

            for (const platform of PLATFORMS) {
                if (
                    x < platform.x - searchDistance ||
                    x > platform.x + platform.w + searchDistance ||
                    y < platform.y - searchDistance ||
                    y > platform.y + platform.h + searchDistance
                ) {
                    continue;
                }

                const candidates = [
                    { x: Math.max(platform.x, Math.min(platform.x + platform.w, x)), y: platform.y, angle: -Math.PI / 2 },
                    { x: Math.max(platform.x, Math.min(platform.x + platform.w, x)), y: platform.y + platform.h, angle: Math.PI / 2 },
                    { x: platform.x, y: Math.max(platform.y, Math.min(platform.y + platform.h, y)), angle: Math.PI },
                    { x: platform.x + platform.w, y: Math.max(platform.y, Math.min(platform.y + platform.h, y)), angle: 0 }
                ];

                for (const candidate of candidates) {
                    const distance = Math.hypot(candidate.x - x, candidate.y - y);
                    if (distance < bestDistance) {
                        bestDistance = distance;
                        bestAnchor = candidate;
                    }
                }
            }

            if (!bestAnchor || bestDistance > searchDistance) {
                return null;
            }

            return bestAnchor;
        }

        function createBurnMark(x, y, sourceRadius = EXPLOSION_RADIUS) {
            const anchor = findNearestSurfaceAnchor(x, y, Math.max(80, sourceRadius * 2.4));
            if (!anchor) {
                return;
            }

            const existing = burnMarks.find((mark) => Math.hypot(mark.x - anchor.x, mark.y - anchor.y) < Math.max(18, sourceRadius * 0.75));
            if (existing) {
                existing.x = existing.x * 0.72 + anchor.x * 0.28;
                existing.y = existing.y * 0.72 + anchor.y * 0.28;
                existing.radius = Math.max(existing.radius, Math.max(28, sourceRadius * 0.95));
                existing.startTime = Date.now();
                existing.duration = Math.min(6200, existing.duration + 900);
                existing.baseAngle = anchor.angle;
                existing.angle = anchor.angle + (Math.random() - 0.5) * 0.62;
                existing.secondaryLean = (Math.random() - 0.5) * 0.44;
                return;
            }

            burnMarks.push({
                id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
                x: anchor.x,
                y: anchor.y,
                radius: Math.max(28, sourceRadius * 0.95),
                startTime: Date.now(),
                duration: 4400,
                baseAngle: anchor.angle,
                angle: anchor.angle + (Math.random() - 0.5) * 0.62,
                secondaryLean: (Math.random() - 0.5) * 0.44
            });

            if (burnMarks.length > 18) {
                burnMarks = burnMarks.slice(-18);
            }
        }

        function drawBurnMarks() {
            const now = Date.now();
            burnMarks = burnMarks.filter((mark) => now - mark.startTime < mark.duration);

            ctx.save();
            ctx.globalCompositeOperation = 'lighter';

            for (const mark of burnMarks) {
                const elapsed = now - mark.startTime;
                const progress = Math.max(0, Math.min(1, elapsed / mark.duration));
                const alpha = (1 - progress) * 0.9;
                const flameRadius = mark.radius * (0.7 + (1 - progress) * 0.25);
                const flickerTime = now * 0.0018 + stableStringNoise(mark.id) * 10;
                const flickerX = Math.sin(flickerTime * 5.2) * 2.8;
                const flameLift = Math.abs(Math.cos(flickerTime * 4.4)) * 1.8;
                const sway = Math.sin(flickerTime * 1.2) * 0.18;
                const baseAngle = mark.baseAngle ?? -Math.PI / 2;
                const riseAngle = baseAngle;
                const riseX = Math.cos(riseAngle);
                const riseY = Math.sin(riseAngle);
                const tangentX = -riseY;
                const tangentY = riseX;
                const primaryAngle = (mark.angle ?? baseAngle) + sway;
                const secondaryAngle = riseAngle + (mark.secondaryLean ?? 0) + Math.cos(flickerTime * 0.9) * 0.12;
                const glowX = mark.x + riseX * flameRadius * 0.12;
                const glowY = mark.y + riseY * flameRadius * 0.12;
                const primaryX = mark.x + riseX * flameRadius * 0.34 + tangentX * flickerX;
                const primaryY = mark.y + riseY * (flameRadius * 0.34 + flameLift) + tangentY * flickerX;
                const secondaryX = mark.x + riseX * flameRadius * 0.26 - tangentX * flickerX * 0.4;
                const secondaryY = mark.y + riseY * flameRadius * 0.26 - tangentY * flickerX * 0.4;

                drawFireballGlow(glowX, glowY, flameRadius * 2.1, 'rgba(255, 214, 120, __A__)', 'rgba(255, 92, 18, __A__)', alpha * 0.42);
                drawPixelFlameBody(primaryX, primaryY, primaryAngle, flameRadius * 0.8, alpha * 0.92, flickerTime, {
                    cellScale: 0.16,
                    tailLength: 0.82,
                    noseLength: 0.3,
                    width: 0.42,
                    alpha: 0.86,
                    emberChance: 0.12,
                    palette: ['#2d0b00', '#6f1b00', '#c44500', '#ff7d1f', '#ffc860', '#fff2c8']
                });
                drawPixelFlameBody(secondaryX, secondaryY, secondaryAngle, flameRadius * 0.46, alpha * 0.56, flickerTime + 1.7, {
                    cellScale: 0.18,
                    tailLength: 0.72,
                    noseLength: 0.24,
                    width: 0.34,
                    alpha: 0.78,
                    emberChance: 0.08,
                    palette: ['#341000', '#7d2100', '#dc5208', '#ffae38', '#ffe07f']
                });

                const smokeAlpha = Math.max(0, 1 - progress * 0.85);
                drawSmokePuff(
                    mark.x + riseX * flameRadius * (0.34 + progress * 0.32),
                    mark.y + riseY * flameRadius * (0.34 + progress * 0.32),
                    flameRadius * (0.42 + progress * 0.75),
                    smokeAlpha * 0.95
                );
                drawSmokePuff(
                    mark.x + riseX * flameRadius * (0.18 + progress * 0.18) - tangentX * flameRadius * 0.12,
                    mark.y + riseY * flameRadius * (0.18 + progress * 0.18) - tangentY * flameRadius * 0.12,
                    flameRadius * (0.26 + progress * 0.45),
                    smokeAlpha * 0.7
                );
            }

            ctx.restore();
        }

        function collectDynamicLights() {
            const lights = [];
            const now = Date.now();
            const renderServerTimeMs = Date.now() - renderDelayMs - serverClockOffsetMs;

            for (const id in explosions) {
                const explosion = explosions[id];
                let age = (now - explosion.spawnTime) / 1000;
                if (typeof explosion.spawn_time_ms === 'number') {
                    age = (renderServerTimeMs - explosion.spawn_time_ms) / 1000;
                }

                if (age < 0 || age >= EXPLOSION_DURATION) {
                    continue;
                }

                const progress = age / EXPLOSION_DURATION;
                const pulse = 0.92 + Math.sin(now * 0.028 + stableStringNoise(id) * 12) * 0.08;
                lights.push({
                    x: (explosion.x - cameraX) * cameraZoom,
                    y: (explosion.y - cameraY) * cameraZoom,
                    radius: (320 + (1 - progress) * 180 + progress * 120) * cameraZoom,
                    strength: Math.max(0.58, (1 - progress * 0.35) * 1.22 * pulse)
                });
            }

            for (const id in fireballs) {
                const fireball = fireballs[id];
                lights.push({
                    x: (fireball.x - cameraX) * cameraZoom,
                    y: (fireball.y - cameraY) * cameraZoom,
                    radius: 250,
                    strength: 0.88
                });
            }

            for (const mark of burnMarks) {
                const age = now - mark.startTime;
                if (age >= mark.duration) {
                    continue;
                }

                const progress = age / mark.duration;
                lights.push({
                    x: (mark.x - cameraX) * cameraZoom,
                    y: (mark.y - cameraY) * cameraZoom,
                    radius: 190 * (1 - progress * 0.18),
                    strength: 0.54 * (1 - progress)
                });
            }

            lights.sort((a, b) => (b.strength * b.radius) - (a.strength * a.radius));
            return lights.slice(0, MAX_DYNAMIC_LIGHTS);
        }

        function drawChargingFireballs(renderServerTimeMs) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';

            for (const sid in playerState) {
                const state = playerState[sid];
                if (!state || !state.is_attacking || typeof state.attack_start_time_ms !== 'number' || state.attack_start_time_ms <= 0) {
                    continue;
                }

                const progress = Math.max(0, Math.min(1, (renderServerTimeMs - state.attack_start_time_ms) / (ATTACK_WARMUP_DURATION * 1000)));
                const direction = state.direction === 'left' ? -1 : 1;
                const orbX = state.x + direction * (22 + progress * 10);
                const orbY = state.y - 18 - progress * 6;
                const jitter = (1 - progress) * 3;
                const shakeX = (Math.sin(renderServerTimeMs * 0.09 + sid.length) + Math.cos(renderServerTimeMs * 0.05 + sid.length * 0.7)) * jitter;
                const shakeY = Math.cos(renderServerTimeMs * 0.12 + sid.length * 1.3) * jitter * 0.7;
                const flameRadius = 10 + progress * 15;

                drawFireballGlow(orbX + shakeX, orbY + shakeY, flameRadius * 2.8, 'rgba(255, 248, 220, __A__)', 'rgba(255, 130, 30, __A__)', 0.44 + progress * 0.28);
                drawFireballGlow(orbX + shakeX * 0.5, orbY + shakeY * 0.5, flameRadius * 1.7, 'rgba(255, 255, 235, __A__)', 'rgba(255, 210, 70, __A__)', 0.54 + progress * 0.24);
                drawPixelFlameBody(orbX + shakeX, orbY + shakeY, progress * 1.1 - Math.PI * 0.1, flameRadius, 0.9 + progress * 0.2, renderServerTimeMs * 0.001, {
                    cellScale: 0.14,
                    tailLength: 1,
                    noseLength: 0.36,
                    width: 0.48,
                    alpha: 0.92,
                    emberChance: 0.14
                });
                drawSmokePuff(orbX - flameRadius * 0.3, orbY + flameRadius * 0.2, flameRadius * 1.1, 0.3 + progress * 0.18, -2, -3);

                ctx.globalAlpha = 0.38 + progress * 0.18;
                for (let i = 0; i < 6; i++) {
                    const emberAngle = (Math.PI * 2 * i) / 6 + renderServerTimeMs * 0.003 + sid.length;
                    const emberRadius = flameRadius * (1.2 + 0.25 * Math.sin(renderServerTimeMs * 0.01 + i));
                    const emberX = orbX + Math.cos(emberAngle) * emberRadius;
                    const emberY = orbY + Math.sin(emberAngle) * emberRadius;
                    ctx.fillStyle = i % 2 === 0 ? '#ffb347' : '#ffd98a';
                    ctx.fillRect(emberX - cameraX - 1.5, emberY - cameraY - 1.5, 3, 3);
                }
                ctx.globalAlpha = 1;
            }

            ctx.restore();
        }

        function drawFireballs() {
            const now = Date.now();
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';

            for (const id in fireballs) {
                const fireball = fireballs[id];
                const angle = Math.atan2(fireball.vy || 0, fireball.vx || 0);
                const dirX = Math.cos(angle);
                const dirY = Math.sin(angle);

                if (fireball.trail && fireball.trail.length > 0) {
                    for (let i = 0; i < fireball.trail.length; i++) {
                        const trailPoint = fireball.trail[i];
                        const age = (now - trailPoint.time) / 1000;
                        if (age >= 0.45) {
                            continue;
                        }

                        const alpha = 1 - age / 0.45;
                        const smokeSize = 8 + age * 26;
                        const smokeX = trailPoint.x - dirX * (age * 42) + Math.sin(age * 30 + i) * 3;
                        const smokeY = trailPoint.y - dirY * (age * 18) - age * 22 + Math.cos(age * 26 + i) * 2;

                        drawSmokePuff(smokeX, smokeY, smokeSize * 0.58, alpha * 0.9);
                        drawPixelFlameBody(
                            trailPoint.x - dirX * age * 10,
                            trailPoint.y - dirY * age * 8,
                            angle + Math.sin(age * 20 + i) * 0.12,
                            (7 + alpha * 12) * 0.72,
                            alpha * 0.6,
                            now * 0.001 + i,
                            {
                                cellScale: 0.17,
                                tailLength: 0.9,
                                noseLength: 0.25,
                                width: 0.34,
                                alpha: 0.8,
                                emberChance: 0.05,
                                extraCellSize: 0
                            }
                        );
                    }
                }

                ctx.globalAlpha = 1;
                drawFireballGlow(fireball.x, fireball.y, FIREBALL_SIZE * 1.55, 'rgba(255, 246, 220, __A__)', 'rgba(255, 120, 24, __A__)', 0.55);
                drawFireballGlow(fireball.x - dirX * 3, fireball.y - dirY * 3, FIREBALL_SIZE * 1.05, 'rgba(255, 250, 235, __A__)', 'rgba(255, 190, 80, __A__)', 0.62);
                drawPixelFlameBody(
                    fireball.x,
                    fireball.y,
                    angle,
                    FIREBALL_SIZE * 0.95,
                    1,
                    now * 0.001 + Number(id) * 0.11,
                    {
                        cellScale: 0.13,
                        tailLength: 1.42,
                        noseLength: 0.34,
                        width: 0.54,
                        alpha: 0.95,
                        emberChance: 0.1,
                        extraCellSize: 1,
                        palette: ['#250800', '#5c1700', '#a82f00', '#ff6818', '#ffbe4f', '#fff3cf']
                    }
                );
                drawPixelFlameBody(
                    fireball.x + dirX * 2.5,
                    fireball.y + dirY * 1.5,
                    angle,
                    FIREBALL_SIZE * 0.52,
                    0.88,
                    now * 0.0013 + Number(id) * 0.07,
                    {
                        cellScale: 0.15,
                        tailLength: 0.7,
                        noseLength: 0.24,
                        width: 0.3,
                        alpha: 0.9,
                        emberChance: 0.06,
                        extraCellSize: 0,
                        palette: ['#4d1200', '#9c2600', '#e85b08', '#ffaf35', '#ffe89a']
                    }
                );
            }

            ctx.restore();
        }

        function drawExplosions() {
            const now = Date.now();
            const renderServerTimeMs = Date.now() - renderDelayMs - serverClockOffsetMs;
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';

            for (const id in explosions) {
                const explosion = explosions[id];
                if (typeof explosion.destroy_time_ms === 'number' && renderServerTimeMs > explosion.destroy_time_ms) {
                    delete explosions[id];
                    continue;
                }

                let age = (now - explosion.spawnTime) / 1000;
                if (typeof explosion.spawn_time_ms === 'number') {
                    age = (renderServerTimeMs - explosion.spawn_time_ms) / 1000;
                }

                if (age >= 0 && age < EXPLOSION_DURATION) {
                    const progress = age / EXPLOSION_DURATION;
                    const blastRadius = EXPLOSION_RADIUS * (0.9 + progress * 2.35);
                    const smokeRadius = EXPLOSION_RADIUS * (1.35 + progress * 3.15);
                    const alpha = Math.max(0, 1 - progress);
                    const blastSeed = stableStringNoise(id) * 10 + now * 0.0007;
                    const flashAlpha = alpha * (progress < 0.22 ? 1.2 : 0.72);
                    const shockwaveRadius = EXPLOSION_RADIUS * (0.55 + progress * 3.4);

                    drawFireballGlow(explosion.x, explosion.y, smokeRadius * 1.5, 'rgba(255, 245, 210, __A__)', 'rgba(255, 92, 20, __A__)', alpha * 0.7);
                    drawFireballGlow(explosion.x, explosion.y, blastRadius * 1.2, 'rgba(255, 255, 240, __A__)', 'rgba(255, 186, 70, __A__)', flashAlpha);
                    drawFireballGlow(explosion.x, explosion.y, blastRadius * 0.6, 'rgba(255, 255, 250, __A__)', 'rgba(255, 228, 145, __A__)', flashAlpha * 1.15);

                    for (let i = 0; i < 10; i++) {
                        const puffAngle = blastSeed + i * 0.91 + Math.sin(progress * 8 + i * 1.7) * 0.55;
                        const puffDistance = smokeRadius * (0.08 + 0.42 * Math.max(0, Math.sin(i * 2.37 + progress * 4.8)));
                        drawSmokePuff(
                            explosion.x + Math.cos(puffAngle) * puffDistance,
                            explosion.y + Math.sin(puffAngle) * puffDistance - progress * (8 + i * 2),
                            smokeRadius * (0.24 + 0.18 * Math.max(0.2, Math.sin(i * 1.43 + progress * 7.1))),
                            alpha * 1.28
                        );
                    }

                    drawSmokePuff(explosion.x, explosion.y + smokeRadius * 0.06, smokeRadius * 0.42, alpha * 1.4);
                    drawSmokePuff(explosion.x - smokeRadius * 0.12, explosion.y - smokeRadius * 0.04, smokeRadius * 0.28, alpha * 1.05);
                    drawSmokePuff(explosion.x + smokeRadius * 0.1, explosion.y + smokeRadius * 0.02, smokeRadius * 0.24, alpha * 0.94);

                    drawFireballGlow(explosion.x, explosion.y, blastRadius * 0.98, 'rgba(255, 250, 236, __A__)', 'rgba(255, 170, 48, __A__)', alpha * 0.86);
                    drawPixelFlameBody(explosion.x, explosion.y, blastSeed * 0.35, blastRadius * (0.82 + (1 - progress) * 0.08), alpha * 1.1, blastSeed, {
                        cellScale: 0.14,
                        tailLength: 0.78,
                        noseLength: 0.78,
                        width: 0.82,
                        alpha: 0.95,
                        emberChance: 0.12,
                        extraCellSize: 1,
                        palette: ['#2f0a00', '#651800', '#b83400', '#ff6818', '#ffc353', '#fff5d4']
                    });

                    drawExplosionLobe(
                        explosion.x,
                        explosion.y - progress * 1.5,
                        blastRadius * (0.62 + (1 - progress) * 0.06),
                        alpha * 0.96,
                        blastSeed
                    );

                    for (let i = 0; i < 6; i++) {
                        const burstAngle = blastSeed + i * 1.04 + Math.cos(i + progress * 4.7) * 0.14;
                        const burstDistance = blastRadius * (0.03 + 0.11 * Math.max(0, Math.sin(i * 1.6 + progress * 5.2)));
                        drawExplosionLobe(
                            explosion.x + Math.cos(burstAngle) * burstDistance,
                            explosion.y + Math.sin(burstAngle) * burstDistance,
                            blastRadius * (0.18 + (1 - progress) * (0.07 + i * 0.012)),
                            alpha * (0.46 - i * 0.04),
                            blastSeed + i * 0.77
                        );
                    }

                    drawRadialSpriteAt(
                        explosion.x,
                        explosion.y,
                        blastRadius,
                        getRadialSpriteCanvas('flash'),
                        flashAlpha
                    );

                    if (progress < 0.35) {
                        ctx.globalAlpha = alpha * 0.44;
                        ctx.strokeStyle = 'rgba(255, 210, 118, 0.85)';
                        ctx.lineWidth = Math.max(3, Math.round(6 - progress * 8));
                        ctx.beginPath();
                        ctx.arc(explosion.x - cameraX, explosion.y - cameraY, shockwaveRadius, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    ctx.globalAlpha = alpha * 0.92;
                    ctx.fillStyle = '#fff7de';
                    const coreSize = Math.max(6, Math.round(blastRadius * (0.16 + (1 - progress) * 0.08)));
                    ctx.fillRect(
                        Math.round(explosion.x - cameraX - coreSize / 2),
                        Math.round(explosion.y - cameraY - coreSize / 2),
                        coreSize,
                        coreSize
                    );

                    for (let i = 0; i < 9; i++) {
                        const sparkAngle = (Math.PI * 2 * i) / 9 + progress * 3.4;
                        const sparkDistance = blastRadius * (0.5 + progress * 1.1);
                        const sparkX = explosion.x + Math.cos(sparkAngle) * sparkDistance;
                        const sparkY = explosion.y + Math.sin(sparkAngle) * sparkDistance;
                        ctx.globalAlpha = alpha * 0.7;
                        ctx.fillStyle = i % 2 === 0 ? '#ffcf7d' : '#ff8f3d';
                        ctx.fillRect(sparkX - cameraX - 2, sparkY - cameraY - 2, 4, 4);
                    }
                } else if (age >= EXPLOSION_DURATION && !explosion.destroy_time_ms) {
                    delete explosions[id];
                }
            }

            ctx.restore();
        }
