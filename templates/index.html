        function draw() {
            const currentTime = performance.now();
            const deltaTime = currentTime - lastFrameTime;

            // 1. Performance Detection
            frameCount++;
            if (currentTime - lastPerformanceCheck > PERFORMANCE_CHECK_INTERVAL) {
                const actualFps = (frameCount * 1000) / (currentTime - lastPerformanceCheck);
                
                // If we consistently drop below 55 FPS on a 60Hz/120Hz target, 
                // cap it to 30 to stabilize the physics and prevent stuttering.
                if (actualFps < 50 && !isLowEnd) {
                    isLowEnd = true;
                    fpsCap = 30; // Cap low-end to 30 FPS
                    frameInterval = 1000 / fpsCap;
                    console.log("Low-end device detected. Capping to 30 FPS.");
                } else if (actualFps > 58 && isLowEnd) {
                    // Optional: Recovery if performance improves
                    isLowEnd = false;
                    fpsCap = 120;
                    frameInterval = 1000 / fpsCap;
                }
                
                frameCount = 0;
                lastPerformanceCheck = currentTime;
            }

            // 2. Frame Rate Limiter
            if (deltaTime < frameInterval) {
                requestAnimationFrame(draw);
                return;
            }

            // Update last frame time (with adjustment for drift)
            lastFrameTime = currentTime - (deltaTime % frameInterval);

            // --- YOUR EXISTING RENDERING CODE STARTS HERE ---
            if (ctx && canvas) {
                updateInterpolatedRenderState(currentTime);

                // Clear main canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                updateScreenShake(Math.min(deltaTime / 1000, 0.1));

                // Apply camera zoom transformation
                ctx.save();
                ctx.scale(cameraZoom, cameraZoom);
                ctx.translate(screenShakeOffsetX / cameraZoom, screenShakeOffsetY / cameraZoom);

                // Calculate target camera position (where camera should be)
                // Update camera to follow local player (including dying players)
                let localPlayerPos = getPlayerPosition(socket.id);
                let localDims = playerRenderDimensions[socket.id] || { width: PLAYER_MAX_SIZE, height: PLAYER_MAX_SIZE };
                
                // Check if player is in dying state (not in normal player states)
                if (dyingPlayers[socket.id]) {
                    // Player is dying - use dying player position for camera
                    const dying = dyingPlayers[socket.id];
                    localPlayerPos = {
                        x: dying.x,
                        y: dying.y
                    };
                    // Use default dimensions for dying players
                    localDims = { width: PLAYER_MAX_SIZE, height: PLAYER_MAX_SIZE };
                }
                
                // Only update camera if we have a valid position (alive or dying)
                if (localPlayerPos) {
                    targetCameraX = localPlayerPos.x - canvas.width / (2 * cameraZoom) + localDims.width / 2;
                    targetCameraY = localPlayerPos.y - canvas.height / (2 * cameraZoom) + localDims.height / 2;

                    // Clamp target camera to map bounds
                    const clampedTargetCamera = clampCameraToMapBounds(targetCameraX, targetCameraY);
                    targetCameraX = clampedTargetCamera.x;
                    targetCameraY = clampedTargetCamera.y;
                }

                // Apply smooth camera lag using lerp
                cameraX += (targetCameraX - cameraX) * cameraLerpFactor;
                cameraY += (targetCameraY - cameraY) * cameraLerpFactor;
                const clampedCamera = clampCameraToMapBounds(cameraX, cameraY);
                cameraX = clampedCamera.x;
                cameraY = clampedCamera.y;

                // Draw tiles if map is loaded
                if (currentMap && tilesetImage) {
                    const mapWidth = currentMap.width;
                    const mapHeight = currentMap.height;
                    const visibleW = canvas.width / cameraZoom;
                    const visibleH = canvas.height / cameraZoom;
                    drawForegroundBackdrops(ctx, cameraX, cameraY);
                    drawChunkedMap(ctx, cameraX, cameraY, visibleW, visibleH);
                    drawBurnMarks();
                    drawChargingFireballs(Date.now() - renderDelayMs - serverClockOffsetMs);

                    // Debug mode: Show collision boxes and platforms
                    if (debugMode) {
                        const tiles = currentMap.tiles;
                        const startTileX = Math.max(0, Math.floor(cameraX / TILE_SIZE));
                        const endTileX = Math.min(mapWidth, Math.ceil((cameraX + visibleW) / TILE_SIZE));
                        const startTileY = Math.max(0, Math.floor(cameraY / TILE_SIZE));
                        const endTileY = Math.min(mapHeight, Math.ceil((cameraY + visibleH) / TILE_SIZE));

                        // Draw collision boxes for each tile
                        const tileCollisions = currentMap.tileCollisions || {};
                        let totalCollisionBoxes = 0;
                        for (let y = startTileY; y < endTileY; y++) {
                            for (let x = startTileX; x < endTileX; x++) {
                                const tileIndex = tiles[y][x];
                                if (tileIndex >= 0) {
                                    const collisionBoxes = tileCollisions[tileIndex] || [{x: 0, y: 0, w: TILE_SIZE, h: TILE_SIZE}];
                                    totalCollisionBoxes += collisionBoxes.length;
                                    for (const box of collisionBoxes) {
                                        ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                                        ctx.strokeStyle = '#00ff00';
                                        ctx.lineWidth = 2;
                                        ctx.fillRect(
                                            x * TILE_SIZE + box.x - cameraX,
                                            y * TILE_SIZE + box.y - cameraY,
                                            box.w,
                                            box.h
                                        );
                                        ctx.strokeRect(
                                            x * TILE_SIZE + box.x - cameraX,
                                            y * TILE_SIZE + box.y - cameraY,
                                            box.w,
                                            box.h
                                        );
                                    }
                                }
                            }
                        }
                        
                        // Draw platforms (server collision boxes)
                        ctx.fillStyle = 'rgba(0, 100, 255, 0.3)';
                        ctx.strokeStyle = '#0066ff';
                        ctx.lineWidth = 2;
                        PLATFORMS.forEach(p => {
                            ctx.fillRect(p.x - cameraX, p.y - cameraY, p.w, p.h);
                            ctx.strokeRect(p.x - cameraX, p.y - cameraY, p.w, p.h);
                        });
                        
                        // Draw debug info
                        ctx.fillStyle = '#fff';
                        ctx.font = '14px monospace';
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 2;
                        ctx.strokeText(`Debug Mode: ON`, 10, 20);
                        ctx.fillText(`Debug Mode: ON`, 10, 20);
                        ctx.strokeText(`Platforms: ${PLATFORMS.length}`, 10, 40);
                        ctx.fillText(`Platforms: ${PLATFORMS.length}`, 10, 40);
                        ctx.strokeText(`Collision Boxes: ${totalCollisionBoxes}`, 10, 60);
                        ctx.fillText(`Collision Boxes: ${totalCollisionBoxes}`, 10, 60);
                        ctx.strokeText(`Green: Tile Collision Boxes (AABB)`, 10, 80);
                        ctx.fillText(`Green: Tile Collision Boxes (AABB)`, 10, 80);
                        ctx.strokeText(`Blue: Server Platforms (AABB)`, 10, 100);
                        ctx.fillText(`Blue: Server Platforms (AABB)`, 10, 100);
                        ctx.strokeText(`Yellow: Player Hitboxes (AABB)`, 10, 120);
                        ctx.fillText(`Yellow: Player Hitboxes (AABB)`, 10, 120);
                        ctx.strokeText(`Collision Type: Rectangle-based (NOT pixel-perfect)`, 10, 140);
                        ctx.fillText(`Collision Type: Rectangle-based (NOT pixel-perfect)`, 10, 140);
                    }
                    
                } else if (PLATFORMS.length > 0) {
                    // Fallback: Draw Platforms with camera offset
                    ctx.fillStyle = '#777';
                    PLATFORMS.forEach(p => {
                        ctx.fillRect(p.x - cameraX, p.y - cameraY, p.w, p.h);
                    });
                }

                // Draw Players with server authoritative positions and camera offset
                for (const sid in playerState) {
                    // Skip rendering dying players (they are rendered separately with death animation)
                    if (dyingPlayers[sid]) {
                        continue;
                    }
                    
                    const state = playerState[sid];
                    if (state) {
                        const pos = { x: state.x, y: state.y }; // Get position from state
                        const action = state.action || 'idle';
                        const direction = state.direction || 'right';
                        const playerCharacter = state.character || 'spartan';
                        
                        // Get assets for this player's specific character
                        const playerAssets = playerCharacterAssets[playerCharacter];
                        const playerMetadata = characterMetadataCache[playerCharacter];
                        
                        // Only render if assets are loaded or if loading has failed
                        if (playerAssets && playerAssets[action] && playerMetadata && playerMetadata[action]) {
                            const meta = playerMetadata[action];
                            const [cols, rows] = meta.grid.split('x').map(Number);
                            const frameCount = meta.frames;
                            
                            // Initialize or update per-player animation frame
                            if (!playerAnimFrames[sid]) {
                                playerAnimFrames[sid] = { frame: 0, action: 'idle', lastUpdate: Date.now() };
                            }
                            
                            // Reset frame if action changed
                            if (playerAnimFrames[sid].action !== action) {
                                playerAnimFrames[sid].action = action;
                                playerAnimFrames[sid].frame = 0;
                                playerAnimFrames[sid].lastUpdate = Date.now();
                            }
                            
                            // Increment frame for this player based on time (not every render frame)
                            const animSpeed = 0.25;
                            const now = Date.now();
                            const timeSinceLastUpdate = now - playerAnimFrames[sid].lastUpdate;
                            const frameDuration = 16 / animSpeed; // Time per frame in ms
                            
                            if (timeSinceLastUpdate >= frameDuration) {
                                playerAnimFrames[sid].frame = (playerAnimFrames[sid].frame + 1) % frameCount;
                                playerAnimFrames[sid].lastUpdate = now;
                            }
                            
                            const frameIdx = playerAnimFrames[sid].frame;
                            
                            const frameX = (frameIdx % cols) * (playerAssets[action].width / cols);
                            const frameY = Math.floor(frameIdx / cols) * (playerAssets[action].height / rows);
                            const frameW = playerAssets[action].width / cols;
                            const frameH = playerAssets[action].height / rows;

                            // Calculate aspect-ratio-preserving render dimensions
                            const renderDims = calculateRenderDimensions(frameW, frameH);
                            
                            // Send dimensions to server if they changed
                            playerRenderDimensions[sid] = renderDims;

                            ctx.save();
                            if (direction === 'left') {
                                ctx.translate(pos.x - cameraX, pos.y - cameraY);
                                ctx.scale(-1, 1);
                                ctx.drawImage(playerAssets[action], frameX, frameY, frameW, frameH, -renderDims.width / 2, -renderDims.height / 2, renderDims.width, renderDims.height);
                            } else {
                                ctx.drawImage(playerAssets[action], frameX, frameY, frameW, frameH, pos.x - cameraX - renderDims.width / 2, pos.y - cameraY - renderDims.height / 2, renderDims.width, renderDims.height);
                            }
                            ctx.restore();
                        } else if (failedCharacters.has(playerCharacter)) {
                            // Only show red square if assets have failed to load
                            const fallbackDims = { width: PLAYER_MAX_SIZE, height: PLAYER_MAX_SIZE };
                            playerRenderDimensions[sid] = fallbackDims;
                            ctx.fillStyle = sid === socket.id ? '#4CAF50' : '#F44336';
                            ctx.fillRect(pos.x - cameraX - fallbackDims.width / 2, pos.y - cameraY - fallbackDims.height / 2, fallbackDims.width, fallbackDims.height);
                        }
                        // If assets are still loading, don't render anything (player will appear when assets are ready)

                        drawAttachedPlayerBurnsForPlayer(sid, Date.now());


                        // Debug mode: Draw player hitbox AFTER character
                        if (debugMode) {
                            const renderDims = playerRenderDimensions[sid] || { width: PLAYER_MAX_SIZE, height: PLAYER_MAX_SIZE };

                            // Hitbox is centered on player position with narrow width
                            const hitboxHalfWidth = PLAYER_HITBOX_WIDTH / 2;
                            const hitboxHalfHeight = PLAYER_HITBOX_HEIGHT / 2;

                            ctx.fillStyle = 'rgba(255, 255, 0, 0.5)';
                            ctx.strokeStyle = '#ffff00';
                            ctx.lineWidth = 3;
                            ctx.fillRect(
                                pos.x - cameraX - hitboxHalfWidth,
                                pos.y - cameraY - hitboxHalfHeight,
                                PLAYER_HITBOX_WIDTH,
                                PLAYER_HITBOX_HEIGHT
                            );
                            ctx.strokeRect(
                                pos.x - cameraX - hitboxHalfWidth,
                                pos.y - cameraY - hitboxHalfHeight,
                                PLAYER_HITBOX_WIDTH,
                                PLAYER_HITBOX_HEIGHT
                            );
                        }

                        // Draw health bar if damaged
                        const latestState = playerState[sid];
                        if (latestState) {
                            const health = latestState.health || PLAYER_MAX_HEALTH;
                            drawHealthBar(ctx, pos.x, pos.y, health, cameraX, cameraY);
                        }
                    }
                }

                // Draw fairies
                if (fairies && fairies.length > 0) {
                    fairies.forEach(fairy => {
                        const fairyX = fairy.x - cameraX;
                        const fairyY = fairy.y - cameraY;
                        
                        // Only draw if fairy is visible on screen
                        if (fairyX > -50 && fairyX < canvas.width / cameraZoom + 50 &&
                            fairyY > -50 && fairyY < canvas.height / cameraZoom + 50) {
                            
                            // Draw 2x2 pixel fairy
                            const color = fairy.color;
                            ctx.fillStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
                            
                            // Apply camera zoom to fairy size
                            const fairySize = FAIRY_SIZE * cameraZoom;
                            
                            // Draw the fairy as a small 2x2 square
                            ctx.fillRect(
                                fairyX * cameraZoom - fairySize / 2,
                                fairyY * cameraZoom - fairySize / 2,
                                fairySize,
                                fairySize
                            );
                            
                            // Add a subtle glow effect
                            ctx.save();
                            ctx.globalAlpha = 0.3;
                            ctx.fillStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
                            ctx.fillRect(
                                fairyX * cameraZoom - fairySize,
                                fairyY * cameraZoom - fairySize,
                                fairySize * 2,
                                fairySize * 2
                            );
                            ctx.restore();
                        }
                    });
                }

                // Draw dying players with death animation and fade-out
                const now = Date.now();
                const deathAnimDuration = 10000; // 10 seconds hold on last frame before fade
                const fadeDuration = 1000; // 1 second fade out

                // Draw floating damage numbers
                if (window.floatingDamageNumbers) {
                    window.floatingDamageNumbers = window.floatingDamageNumbers.filter(dn => {
                        const elapsed = now - dn.startTime;
                        if (elapsed > dn.duration) return false;
                        
                        const progress = elapsed / dn.duration;
                        const alpha = 1 - progress;
                        const yOffset = -progress * 50;
                        
                        ctx.save();
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = "#ff4444";
                        ctx.font = "bold 20px Arial";
                        ctx.strokeStyle = "#000";
                        ctx.lineWidth = 2;
                        ctx.strokeText(`-${dn.damage}`, dn.x - cameraX, dn.y + yOffset - cameraY);
                        ctx.fillText(`-${dn.damage}`, dn.x - cameraX, dn.y + yOffset - cameraY);
                        ctx.restore();
                        
                        return true;
                    });
                }

                // Draw death messages
                if (window.deathMessages) {
                    window.deathMessages = window.deathMessages.filter(dm => {
                        const elapsed = now - dm.startTime;
                        if (elapsed > dm.duration) return false;
                        
                        const progress = elapsed / dm.duration;
                        const alpha = 1 - progress;
                        
                        ctx.save();
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = "#ff0000";
                        ctx.font = "bold 24px Arial";
                        ctx.strokeStyle = "#000";
                        ctx.lineWidth = 3;
                        ctx.textAlign = "center";
                        ctx.strokeText(`Player ${dm.sid.substring(0, 4)} killed!`, canvas.width / 2, 100);
                        ctx.fillText(`Player ${dm.sid.substring(0, 4)} killed!`, canvas.width / 2, 100);
                        ctx.restore();
                        
                        return true;
                    });
                }

                // Calculate delta time for physics (in seconds)
                if (!window.lastFrameTime) window.lastFrameTime = now;
                const dt = Math.min((now - window.lastFrameTime) / 1000, 0.1); // Cap at 0.1s to prevent physics explosions
                window.lastFrameTime = now;

                // Update dust particles
                updateDustParticles(dt);
                updateSpatialAudio(currentTime);

                for (const sid in dyingPlayers) {
                    const dying = dyingPlayers[sid];

                    // Apply gravity if player was in the air when dying
                    if (!dying.on_ground && !dying.landed) {
                        // Apply gravity
                        dying.vy += GRAVITY * dt * 60; // Scale to 60fps like server
                        dying.y += dying.vy * dt;

                        // Check for ground collision
                        const hitboxHalfWidth = PLAYER_HITBOX_WIDTH / 2;
                        const hitboxHalfHeight = PLAYER_HITBOX_HEIGHT / 2;
                        const hitboxX = dying.x - hitboxHalfWidth;
                        const hitboxY = dying.y - hitboxHalfHeight;

                        // Check collision with platforms
                        for (const plat of PLATFORMS) {
                            if (hitboxX < plat.x + plat.w &&
                                hitboxX + PLAYER_HITBOX_WIDTH > plat.x &&
                                hitboxY < plat.y + plat.h &&
                                hitboxY + PLAYER_HITBOX_HEIGHT > plat.y) {

                                // Check if this is a ground collision (player falling onto platform)
                                if (dying.vy > 0 && hitboxY + PLAYER_HITBOX_HEIGHT <= plat.y + dying.vy * dt + 1) {
                                    // Landed on platform
                                    dying.y = plat.y - hitboxHalfHeight;
                                    dying.vy = 0;
                                    dying.landed = true;
                                    break;
                                }
                            }
                        }
                    }

                    const playerAssets = playerCharacterAssets[dying.character];
                    const playerMetadata = characterMetadataCache[dying.character];

                    if (playerAssets && playerAssets.death && playerMetadata && playerMetadata.death) {
                        const meta = playerMetadata.death;
                        const [cols, rows] = meta.grid.split('x').map(Number);
                        const frameCount = meta.frames;

                        // Calculate elapsed time since death
                        const elapsed = now - dying.deathStartTime;

                        // Determine current frame for death animation
                        const animSpeed = 0.25;
                        const frameDuration = 16 / animSpeed;
                        const framesElapsed = Math.floor(elapsed / frameDuration);

                        // Hold on last frame when animation completes
                        dying.deathFrame = Math.min(framesElapsed, frameCount - 1);

                        // Calculate opacity for fade-out
                        if (elapsed > deathAnimDuration) {
                            const fadeElapsed = elapsed - deathAnimDuration;
                            dying.opacity = Math.max(0, 1.0 - (fadeElapsed / fadeDuration));
                        } else {
                            dying.opacity = 1.0;
                        }

                        // Remove player if fully faded
                        if (dying.opacity <= 0) {
                            delete dyingPlayers[sid];
                            continue;
                        }

                        // Render dying player with death animation
                        const frameIdx = dying.deathFrame;
                        const frameX = (frameIdx % cols) * (playerAssets.death.width / cols);
                        const frameY = Math.floor(frameIdx / cols) * (playerAssets.death.height / rows);
                        const frameW = playerAssets.death.width / cols;
                        const frameH = playerAssets.death.height / rows;
                        const renderDims = calculateRenderDimensions(frameW, frameH);

                        ctx.save();
                        ctx.globalAlpha = dying.opacity;

                        if (dying.direction === 'left') {
                            ctx.translate(dying.x - cameraX, dying.y - cameraY);
                            ctx.scale(-1, 1);
                            ctx.drawImage(playerAssets.death, frameX, frameY, frameW, frameH, -renderDims.width / 2, -renderDims.height / 2, renderDims.width, renderDims.height);
                        } else {
                            ctx.drawImage(playerAssets.death, frameX, frameY, frameW, frameH, dying.x - cameraX - renderDims.width / 2, dying.y - cameraY - renderDims.height / 2, renderDims.width, renderDims.height);
                        }

                        ctx.restore();
                    }
                }

                // Draw dust particles
                drawDustParticles();

                // Draw fireballs with particle trails
                drawFireballs();

                // Draw explosions
                drawExplosions();


                // --- DRAW PLAYER NAMES BEFORE WEBGL ---
                // Draw names here so they are affected by to shader
                for (const sid in playerState) {
                    // Skip rendering dying players (they are rendered separately with death animation)
                    if (dyingPlayers[sid]) {
                        continue;
                    }
                    
                    const state = playerState[sid];
                    if (!state) continue;
                    
                    const pos = { x: state.x, y: state.y };
                    const displayName = state.name || `P${sid.substring(0, 4)}`;
                    const renderDims = playerRenderDimensions[sid] || { width: 60, height: 60 };
                    
                    // Position exactly where it was before to avoid shifting
                    const nameY = pos.y - cameraY - renderDims.height / 2 - 10;
                    const nameX = pos.x - cameraX;

                    ctx.save();
                    ctx.font = 'bold 16px "EB Garamond", serif';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                    ctx.shadowBlur = 2;
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(displayName, nameX, nameY);
                    ctx.restore();
                }
                // --- END PLAYER NAMES ---

                // --- DRAW CHAT MESSAGES BEFORE WEBGL ---
                // Draw chat messages here so they are affected by the shader
                for (const sid in chatMessages) {
                    const pos = getPlayerPosition(sid);
                    if (!pos) continue;

                    const chatMsg = chatMessages[sid];
                    const elapsed = now - chatMsg.startTime;
                    
                    // Only draw if within duration
                    if (elapsed < CHAT_MESSAGE_DURATION + CHAT_FADE_DURATION) {
                        let opacity = 1.0;
                        let scale = 1.0;
                        
                        if (elapsed > CHAT_MESSAGE_DURATION) {
                            // Fade out phase
                            const fadeProgress = (elapsed - CHAT_MESSAGE_DURATION) / CHAT_FADE_DURATION;
                            opacity = Math.max(0, 1.0 - fadeProgress);
                            scale = Math.max(0.5, 1.0 - fadeProgress * 0.5); // Scale down to 0.5
                        }
                        
                        // Remove expired messages
                        if (opacity <= 0) {
                            delete chatMessages[sid];
                            continue;
                        }

                        ctx.save();
                        ctx.globalAlpha = opacity;
                        ctx.scale(scale, scale);
                        ctx.font = 'bold 18px "EB Garamond", serif';
                        ctx.textAlign = 'center';
                        
                        // Match the position exactly so it doesn't shift
                        // 70 pixels above the player head to clear the name tag
                        const textX = (pos.x - cameraX) / scale;
                        const textY = (pos.y - cameraY - 70) / scale; 

                        // Black outline for clarity
                        ctx.strokeStyle = '#000000';
                        ctx.lineWidth = 3;
                        ctx.strokeText(chatMsg.text, textX, textY);
                        
                        // White fill
                        ctx.fillStyle = '#ffffff';
                        ctx.fillText(chatMsg.text, textX, textY);
                        ctx.restore();
                    } else {
                        // Remove expired messages
                        delete chatMessages[sid];
                    }
                }
                // --- END CHAT MESSAGES ---

                ctx.restore();

                // WebGL Post-processing
                if (gl && program) {
                    gl.useProgram(program);

                    // Update texture with 2D canvas content
                    gl.bindTexture(gl.TEXTURE_2D, texture);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, canvas);

                    // Set uniforms
                    gl.uniform2f(glResolutionLocation, glCanvas.width, glCanvas.height);
                    gl.uniform1f(glTimeLocation, performance.now() / 1000);

                    const localPlayerPos = getPlayerPosition(socket.id);
                    if (localPlayerPos) {
                        // Convert game coordinates to screen coordinates
                        // Apply camera transformation and zoom, then center on the player
                        const screenX = (localPlayerPos.x - cameraX) * cameraZoom;
                        const screenY = (localPlayerPos.y - cameraY) * cameraZoom;
                        
                        // Ensure light stays centered on player regardless of position
                        // The coordinates should be relative to the canvas, not flipped
                        const finalX = screenX;
                        const finalY = screenY;
                        
                        gl.uniform2f(glLightPosLocation, finalX, finalY);
                    } else {
                        // When player position is unavailable (e.g., low-end PC frame drops),
                        // center the light on screen to maintain visibility instead of going black
                        const centerX = glCanvas.width / 2;
                        const centerY = glCanvas.height / 2;
                        gl.uniform2f(glLightPosLocation, centerX, centerY);
                    }

                    const dynamicLights = collectDynamicLights();
                    const dynamicLightBuffer = new Float32Array(MAX_DYNAMIC_LIGHTS * 4);
                    for (let i = 0; i < dynamicLights.length && i < MAX_DYNAMIC_LIGHTS; i++) {
                        const light = dynamicLights[i];
                        dynamicLightBuffer[i * 4 + 0] = light.x;
                        dynamicLightBuffer[i * 4 + 1] = light.y;
                        dynamicLightBuffer[i * 4 + 2] = light.radius;
                        dynamicLightBuffer[i * 4 + 3] = light.strength;
                    }
                    gl.uniform4fv(glDynamicLightsLocation, dynamicLightBuffer);

                    // Bind buffers
                    gl.enableVertexAttribArray(glPositionLocation);
                    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                    gl.vertexAttribPointer(glPositionLocation, 2, gl.FLOAT, false, 0, 0);

                    gl.enableVertexAttribArray(glTexCoordLocation);
                    gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
                    gl.vertexAttribPointer(glTexCoordLocation, 2, gl.FLOAT, false, 0, 0);

                    // Draw to WebGL canvas
                    gl.clearColor(0, 0, 0, 1);
                    gl.clear(gl.COLOR_BUFFER_BIT);
                    gl.drawArrays(gl.TRIANGLES, 0, 6);

                }
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
