<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Enhancer - Grid Slicer</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow-x: auto;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        
        .controls {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        label {
            font-weight: bold;
            color: #e94560;
        }
        
        input[type="number"], select {
            padding: 8px;
            border: 2px solid #4CAF50;
            border-radius: 5px;
            background: #0f3460;
            color: #fff;
            width: 80px;
            font-size: 16px;
        }

        select {
            width: 180px;
        }
        
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .info {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .canvas-container {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
            overflow: auto;
            max-height: 80vh;
        }
        
        canvas {
            border: 3px solid #4CAF50;
            cursor: crosshair;
            display: block;
        }
        
        button.download-all {
            background: #e94560;
        }
        
        button.download-all:hover {
            background: #d6364f;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 20px;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Map Enhancer - Grid Slicer</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="areaSelect">Area:</label>
                <select id="areaSelect"></select>
            </div>
            <div class="control-group">
                <label for="splitColumns">Split Columns:</label>
                <input type="number" id="splitColumns" value="4" min="1" max="20">
            </div>
            <div class="control-group">
                <label for="splitRows">Split Rows:</label>
                <input type="number" id="splitRows" value="4" min="1" max="20">
            </div>
            <button id="applyGrid">Refresh Areas</button>
            <button id="downloadArea">Download This Area</button>
            <button id="downloadSplit">Download Split Tiles</button>
            <button id="downloadAll" class="download-all">Download All Areas</button>
            <button id="downloadFull" class="download-all">FULL Screenshot</button>
            <div class="info" id="gridInfo">Areas: 1x1</div>
            <div class="info" id="mapInfo">Loading map...</div>
            <div class="info" id="splitInfo">Split: 4x4</div>
        </div>
        
        <div class="canvas-container">
            <div id="loading" class="loading">Loading map and tileset...</div>
            <canvas id="mapCanvas"></canvas>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const TILE_SIZE = 32;
        const BACKGROUND_REFERENCE_WIDTH = 3200;
        const BACKGROUND_REFERENCE_HEIGHT = 1600;
        const BACKGROUND_TILE_WIDTH = BACKGROUND_REFERENCE_WIDTH / TILE_SIZE;
        const BACKGROUND_TILE_HEIGHT = BACKGROUND_REFERENCE_HEIGHT / TILE_SIZE;
        const BACKGROUND_PIXEL_WIDTH = BACKGROUND_TILE_WIDTH * TILE_SIZE;
        const BACKGROUND_PIXEL_HEIGHT = BACKGROUND_TILE_HEIGHT * TILE_SIZE;
        let currentMap = null;
        let tilesetImage = null;
        let gridColumns = 1;
        let gridRows = 1;
        let areaOptions = [];
        let selectedAreaIndex = 0;
        let splitColumns = 4;
        let splitRows = 4;
        
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const loadingDiv = document.getElementById('loading');
        const areaSelect = document.getElementById('areaSelect');
        const splitColumnsInput = document.getElementById('splitColumns');
        const splitRowsInput = document.getElementById('splitRows');
        let assetSessionTokenPromise = null;

        async function getAssetSessionToken(forceRefresh = false) {
            if (!assetSessionTokenPromise || forceRefresh) {
                assetSessionTokenPromise = fetch('/api/asset_session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                }).then(async (response) => {
                    if (!response.ok) {
                        throw new Error(`Failed to get asset session: ${response.status}`);
                    }

                    const data = await response.json();
                    if (!data.token) {
                        throw new Error('Asset session token missing from response');
                    }

                    return data.token;
                }).catch((error) => {
                    assetSessionTokenPromise = null;
                    throw error;
                });
            }

            return assetSessionTokenPromise;
        }

        async function fetchWithAssetSession(url, options = {}) {
            const originalHeaders = options.headers || {};
            let sessionToken = await getAssetSessionToken();
            let response = await fetch(url, {
                ...options,
                headers: {
                    ...originalHeaders,
                    'X-Asset-Session': sessionToken
                }
            });

            if (response.status === 401) {
                sessionToken = await getAssetSessionToken(true);
                response = await fetch(url, {
                    ...options,
                    headers: {
                        ...originalHeaders,
                        'X-Asset-Session': sessionToken
                    }
                });
            }

            return response;
        }

        async function requestEnvironmentToken() {
            const response = await fetchWithAssetSession('/api/request_environment_token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) {
                throw new Error(`Failed to request environment token: ${response.status}`);
            }

            const data = await response.json();
            if (!data.token) {
                throw new Error('Environment token missing from response');
            }

            return data.token;
        }
        
        async function loadMap() {
            try {
                const response = await fetch('/api/current_map?map=default');
                const mapData = await response.json();
                
                if (mapData.error) {
                    throw new Error(mapData.error);
                }
                
                currentMap = mapData;
                syncGridToBackgroundAreas();
                document.getElementById('mapInfo').textContent =
                    `Map: ${mapData.width}x${mapData.height} tiles (${mapData.width * TILE_SIZE}x${mapData.height * TILE_SIZE}px)`;
                
                return mapData;
            } catch (error) {
                console.error('Error loading map:', error);
                loadingDiv.textContent = 'Error loading map: ' + error.message;
                throw error;
            }
        }
        
        async function loadTileset() {
            try {
                const environmentToken = await requestEnvironmentToken();
                const response = await fetchWithAssetSession(`/api/tileset/${environmentToken}`);
                if (!response.ok) {
                    throw new Error(`Failed to fetch tileset: ${response.status}`);
                }
                const bytes = await response.arrayBuffer();
                const blob = new Blob([bytes], { type: 'image/png' });
                tilesetImage = await createImageBitmap(blob);
                return tilesetImage;
            } catch (error) {
                console.error('Error loading tileset:', error);
                loadingDiv.textContent = 'Error loading tileset: ' + error.message;
                throw error;
            }
        }
        
        function renderMapWithoutGrid() {
            if (!currentMap || !tilesetImage) {
                return null;
            }
            
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            const mapWidth = currentMap.width * TILE_SIZE;
            const mapHeight = currentMap.height * TILE_SIZE;
            
            tempCanvas.width = mapWidth;
            tempCanvas.height = mapHeight;
            
            const tiles = currentMap.tiles;
            const mapTileWidth = currentMap.width;
            const mapTileHeight = currentMap.height;
            const tilesetWidth = tilesetImage.width / 4;
            const tilesetHeight = tilesetImage.height / 3;
            
            for (let y = 0; y < mapTileHeight; y++) {
                for (let x = 0; x < mapTileWidth; x++) {
                    const tileIndex = tiles[y][x];
                    if (tileIndex >= 0) {
                        const col = tileIndex % 4;
                        const row = Math.floor(tileIndex / 4);
                        tempCtx.drawImage(
                            tilesetImage,
                            col * tilesetWidth, row * tilesetHeight, tilesetWidth, tilesetHeight,
                            x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE
                        );
                    }
                }
            }
            
            return tempCanvas;
        }

        function getAreaDimensions(col, row) {
            const x = col * BACKGROUND_PIXEL_WIDTH;
            const y = row * BACKGROUND_PIXEL_HEIGHT;

            return {
                col,
                row,
                x,
                y,
                width: Math.max(0, Math.min(BACKGROUND_PIXEL_WIDTH, currentMap.width * TILE_SIZE - x)),
                height: Math.max(0, Math.min(BACKGROUND_PIXEL_HEIGHT, currentMap.height * TILE_SIZE - y))
            };
        }

        function buildAreaOptions() {
            areaOptions = [];

            for (let row = 0; row < gridRows; row++) {
                for (let col = 0; col < gridColumns; col++) {
                    const area = getAreaDimensions(col, row);
                    if (area.width > 0 && area.height > 0) {
                        areaOptions.push(area);
                    }
                }
            }

            if (selectedAreaIndex >= areaOptions.length) {
                selectedAreaIndex = 0;
            }

            areaSelect.innerHTML = '';
            areaOptions.forEach((area, index) => {
                const option = document.createElement('option');
                option.value = String(index);
                option.textContent = `Area ${area.col + 1},${area.row + 1}`;
                areaSelect.appendChild(option);
            });

            areaSelect.value = String(selectedAreaIndex);
        }

        function getSelectedArea() {
            return areaOptions[selectedAreaIndex] || null;
        }

        function syncSplitSettings() {
            splitColumns = Math.max(1, Math.min(20, parseInt(splitColumnsInput.value, 10) || 1));
            splitRows = Math.max(1, Math.min(20, parseInt(splitRowsInput.value, 10) || 1));
            splitColumnsInput.value = splitColumns;
            splitRowsInput.value = splitRows;
            document.getElementById('splitInfo').textContent = `Split: ${splitColumns}x${splitRows}`;
        }
        
        function renderMap() {
            if (!currentMap || !tilesetImage) {
                return;
            }

            const fullMapCanvas = renderMapWithoutGrid();
            const selectedArea = getSelectedArea();
            if (!fullMapCanvas || !selectedArea) {
                return;
            }

            canvas.width = selectedArea.width;
            canvas.height = selectedArea.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(
                fullMapCanvas,
                selectedArea.x,
                selectedArea.y,
                selectedArea.width,
                selectedArea.height,
                0,
                0,
                selectedArea.width,
                selectedArea.height
            );

            drawGrid();
        }

        function syncGridToBackgroundAreas() {
            if (!currentMap) {
                return;
            }

            gridColumns = Math.max(1, Math.ceil(currentMap.width / BACKGROUND_TILE_WIDTH));
            gridRows = Math.max(1, Math.ceil(currentMap.height / BACKGROUND_TILE_HEIGHT));
            buildAreaOptions();

            const exactWidth = currentMap.width % BACKGROUND_TILE_WIDTH === 0;
            const exactHeight = currentMap.height % BACKGROUND_TILE_HEIGHT === 0;
            const fitLabel = exactWidth && exactHeight ? 'exact background chunks' : 'includes partial edge chunk';
            document.getElementById('gridInfo').textContent =
                `Areas: ${areaOptions.length} total (${gridColumns}x${gridRows} layout, ${BACKGROUND_TILE_WIDTH}x${BACKGROUND_TILE_HEIGHT} tiles each, ${fitLabel})`;
        }
        
        function drawGrid() {
            const selectedArea = getSelectedArea();
            if (!currentMap || !selectedArea) {
                return;
            }

            ctx.save();
            ctx.strokeStyle = '#5cff72';
            ctx.lineWidth = 3;
            ctx.setLineDash([12, 10]);
            ctx.strokeRect(1.5, 1.5, Math.max(0, canvas.width - 3), Math.max(0, canvas.height - 3));
            ctx.setLineDash([]);
            ctx.fillStyle = '#5cff72';
            ctx.font = '24px Segoe UI';
            ctx.fillText(`Area ${selectedArea.col + 1},${selectedArea.row + 1}`, 16, 32);

            const tileWidth = canvas.width / splitColumns;
            const tileHeight = canvas.height / splitRows;
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 6]);
            for (let i = 1; i < splitColumns; i++) {
                const x = i * tileWidth;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let i = 1; i < splitRows; i++) {
                const y = i * tileHeight;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.fillStyle = '#e94560';
            ctx.font = '18px Segoe UI';
            for (let row = 0; row < splitRows; row++) {
                for (let col = 0; col < splitColumns; col++) {
                    ctx.fillText(`${col + 1},${row + 1}`, col * tileWidth + 10, row * tileHeight + 22);
                }
            }
            ctx.restore();
        }

        function downloadSelectedArea() {
            const mapWithoutGrid = renderMapWithoutGrid();
            const selectedArea = getSelectedArea();
            if (!mapWithoutGrid || !selectedArea) {
                alert('Map not loaded!');
                return;
            }

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = selectedArea.width;
            tempCanvas.height = selectedArea.height;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.drawImage(
                mapWithoutGrid,
                selectedArea.x,
                selectedArea.y,
                selectedArea.width,
                selectedArea.height,
                0,
                0,
                selectedArea.width,
                selectedArea.height
            );

            const link = document.createElement('a');
            link.download = `area_${selectedArea.col + 1}_${selectedArea.row + 1}.png`;
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        }
        
        async function downloadAllTiles() {
            const mapWithoutGrid = renderMapWithoutGrid();
            if (!mapWithoutGrid) {
                alert('Map not loaded!');
                return;
            }

            const zip = new JSZip();
            
            for (const area of areaOptions) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = area.width;
                tempCanvas.height = area.height;
                const tempCtx = tempCanvas.getContext('2d');

                tempCtx.drawImage(
                    mapWithoutGrid,
                    area.x,
                    area.y,
                    area.width,
                    area.height,
                    0,
                    0,
                    area.width,
                    area.height
                );

                const imageData = tempCanvas.toDataURL('image/png').split(',')[1];
                zip.file(`area_${area.col + 1}_${area.row + 1}.png`, imageData, { base64: true });
            }
            
            const content = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `areas_${gridColumns}x${gridRows}.zip`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        async function downloadSplitTiles() {
            const mapWithoutGrid = renderMapWithoutGrid();
            const selectedArea = getSelectedArea();
            if (!mapWithoutGrid || !selectedArea) {
                alert('Map not loaded!');
                return;
            }

            const splitWidth = selectedArea.width / splitColumns;
            const splitHeight = selectedArea.height / splitRows;
            const zip = new JSZip();

            for (let row = 0; row < splitRows; row++) {
                for (let col = 0; col < splitColumns; col++) {
                    const sourceX = selectedArea.x + col * splitWidth;
                    const sourceY = selectedArea.y + row * splitHeight;
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = Math.round(splitWidth);
                    tempCanvas.height = Math.round(splitHeight);
                    const tempCtx = tempCanvas.getContext('2d');

                    tempCtx.drawImage(
                        mapWithoutGrid,
                        sourceX,
                        sourceY,
                        splitWidth,
                        splitHeight,
                        0,
                        0,
                        tempCanvas.width,
                        tempCanvas.height
                    );

                    const imageData = tempCanvas.toDataURL('image/png').split(',')[1];
                    zip.file(
                        `area_${selectedArea.col + 1}_${selectedArea.row + 1}_tile_${col + 1}_${row + 1}.png`,
                        imageData,
                        { base64: true }
                    );
                }
            }

            const content = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `area_${selectedArea.col + 1}_${selectedArea.row + 1}_split_${splitColumns}x${splitRows}.zip`;
            link.click();
            URL.revokeObjectURL(link.href);
        }
        
        async function downloadFullScreenshot() {
            const mapWithoutGrid = renderMapWithoutGrid();
            if (!mapWithoutGrid) {
                alert('Map not loaded!');
                return;
            }

            const link = document.createElement('a');
            link.download = `full_level_${currentMap.width}x${currentMap.height}.png`;
            link.href = mapWithoutGrid.toDataURL('image/png');
            link.click();
        }

        document.getElementById('applyGrid').addEventListener('click', () => {
            syncGridToBackgroundAreas();
            syncSplitSettings();
            renderMap();
        });

        areaSelect.addEventListener('change', (event) => {
            selectedAreaIndex = parseInt(event.target.value, 10) || 0;
            renderMap();
        });

        splitColumnsInput.addEventListener('input', () => {
            syncSplitSettings();
            renderMap();
        });

        splitRowsInput.addEventListener('input', () => {
            syncSplitSettings();
            renderMap();
        });

        document.getElementById('downloadArea').addEventListener('click', downloadSelectedArea);
        document.getElementById('downloadSplit').addEventListener('click', downloadSplitTiles);
        document.getElementById('downloadAll').addEventListener('click', downloadAllTiles);
        document.getElementById('downloadFull').addEventListener('click', downloadFullScreenshot);
        
        async function init() {
            try {
                await Promise.all([loadMap(), loadTileset()]);
                loadingDiv.style.display = 'none';
                syncSplitSettings();
                renderMap();
            } catch (error) {
                console.error('Initialization error:', error);
            }
        }
        
        init();
    </script>
</body>
</html>
