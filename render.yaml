services:
  - type: web
    name: platformer-buddies
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: data
      - key: CHUNK_DIR
        value: secure_asset_chunks
